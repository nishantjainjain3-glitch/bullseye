  "cardano": "ADA-USD",
  "avalanche-2": "AVAX-USD",
  "chainlink": "LINK-USD",
  "polkadot": "DOT-USD"
};

// NSE symbols that need .NS suffix for Yahoo Finance
const NSE_SYMBOLS_LIST = [
  "RELIANCE.NS","HDFCBANK.NS","TCS.NS","INFY.NS","ICICIBANK.NS",
  "HINDUNILVR.NS","BAJFINANCE.NS","SBIN.NS","WIPRO.NS","LTIM.NS",
  "AXISBANK.NS","MARUTI.NS","SUNPHARMA.NS","TATAMOTORS.NS","HCLTECH.NS",
  "KOTAKBANK.NS","TITAN.NS","ADANIENT.NS","ONGC.NS","POWERGRID.NS",
  "PERSISTENT.NS","POLYCAB.NS","DIXON.NS","TATAPOWER.NS","IDFCFIRSTB.NS"
];

// CoinGecko markets cache
let _cgMarketsCache = null;
let _cgMarketsCacheTime = 0;
const CG_MARKETS_TTL = 60000; // 60s

async function fetchYahooQuotes(symbols) {
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(",")}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Yahoo fetch failed: ${res.status}`);
  const data = await res.json();
  const quotes = data?.quoteResponse?.result || [];
  const out = {};
  for (const q of quotes) {
    const sym = q.symbol.replace(".NS", "");
    out[sym] = {
      price: q.regularMarketPrice,
      change: q.regularMarketChangePercent
    };
  }
  return out;
}

async function fetchCoinGeckoMarkets() {
  const now = Date.now();
  if (_cgMarketsCache && (now - _cgMarketsCacheTime) < CG_MARKETS_TTL) {
    return _cgMarketsCache;
  }
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1&sparkline=false&price_change_percentage=24h,7d`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`CoinGecko markets fetch failed: ${res.status}`);
  const data = await res.json();
  _cgMarketsCache = data;
  _cgMarketsCacheTime = now;
  return data;
}

async function fetchCryptoPrices() {
  const data = await fetchCoinGeckoMarkets();
  const out = {};
  const reverseMap = {}; // id → symbol key
  for (const [id, sym] of Object.entries(CRYPTO_ID_MAP)) reverseMap[id] = sym;
  for (const coin of data) {
    const symKey = reverseMap[coin.id];
    if (symKey) {
      out[symKey] = {
        price: coin.current_price,
        change: coin.price_change_percentage_24h ?? 0,
        change7d: coin.price_change_percentage_7d_in_currency ?? 0,
        marketCap: coin.market_cap,
        volume: coin.total_volume,
        high24h: coin.high_24h,
        low24h: coin.low_24h,
        circulatingSupply: coin.circulating_supply,
        rank: coin.market_cap_rank,
        name: coin.name,
        id: coin.id,
        image: coin.image
      };
    }
  }
  return out;
}

function LiveDataProvider({ children }) {
  const [state, setState] = React.useState({
    prices: {}, lastUpdated: null, isLive: false, error: null
  });

  const fetchAll = React.useCallback(async () => {
    try {
      const [nseData, cryptoData] = await Promise.allSettled([
        fetchYahooQuotes(NSE_SYMBOLS_LIST),
        fetchCryptoPrices()
      ]);

      const prices = {};
      if (nseData.status === "fulfilled") Object.assign(prices, nseData.value);
      if (cryptoData.status === "fulfilled") Object.assign(prices, cryptoData.value);

      const hasAny = Object.keys(prices).length > 0;
      setState({
        prices,
        lastUpdated: new Date(),
        isLive: hasAny,
        error: hasAny ? null : "All data sources unavailable"
      });
    } catch (err) {
      setState(prev => ({ ...prev, isLive: false, error: err.message }));
    }
  }, []);

  React.useEffect(() => {
    fetchAll();
    const id = setInterval(fetchAll, 60000);
    return () => clearInterval(id);
  }, [fetchAll]);

  return (
    <LiveDataContext.Provider value={state}>
      {children}
    </LiveDataContext.Provider>
  );
}

// AI Analysis state — stored in module scope so it persists across re-renders
window.__aiAnalysisCache = window.__aiAnalysisCache || {};
window.__aiAnalysisListeners = window.__aiAnalysisListeners || [];

function notifyAIListeners() {
  window.__aiAnalysisListeners.forEach(fn => fn());
}

function useAIAnalysis() {
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    window.__aiAnalysisListeners.push(forceUpdate);
    return () => {
      window.__aiAnalysisListeners = window.__aiAnalysisListeners.filter(fn => fn !== forceUpdate);
    };
  }, []);
  return window.__aiAnalysisCache;
}

async function analyzeStockWithClaude(rec, apiKey) {
  const prompt = `You are a quantitative equity analyst. Analyze this stock recommendation and return ONLY valid JSON with no markdown or explanation.

Stock: ${rec.symbol} (${rec.name}) on ${rec.exchange}
Current Price: ${rec.currency}${rec.price}
Change Today: ${rec.change > 0 ? "+" : ""}${rec.change.toFixed(2)}%
Current Action: ${rec.action}
Confidence: ${rec.confidence}%
Entry Zone: ${rec.currency}${rec.entry.low}–${rec.currency}${rec.entry.high}
Targets: ${rec.targets.map((t, i) => `T${i+1}=${rec.currency}${t}`).join(", ")}
Stop Loss: ${rec.currency}${rec.stopLoss}
R:R Ratio: ${rec.rr}:1
Risk: ${rec.risk}
Horizon: ${rec.horizon}
RSI(14): ${rec.rsi}
P/E: ${rec.pe || "N/A"}
Market Cap: ${rec.marketCap}
Sector: ${rec.sector}
Rationale: ${rec.rationale}
Catalysts: ${rec.catalysts.join(", ")}

Return JSON with exactly these fields:
{
  "action": "BUY" | "SELL" | "HOLD",
  "confidence": 0-100,
  "rationale": "2-3 sentence AI analysis",
  "entry": {"low": number, "high": number},
  "targets": [number, number, number],
  "stopLoss": number,
  "rr": number,
  "catalysts": ["string", "string", "string"],
  "risk": "LOW" | "MEDIUM" | "HIGH" | "VERY HIGH",
  "horizon": "string like '3-6 months'"
}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 800,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Claude API error ${response.status}: ${errText}`);
  }
  const data = await response.json();
  const text = data.content[0].text;
  // extract JSON from response
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("No JSON found in Claude response");
  return JSON.parse(jsonMatch[0]);
}

// Batch analyze with max 5 concurrent
async function analyzeAllStocks(recs, apiKey, onProgress) {
  const batchSize = 5;
  for (let i = 0; i < recs.length; i += batchSize) {
    const batch = recs.slice(i, i + batchSize);
    await Promise.allSettled(batch.map(async rec => {
      window.__aiAnalysisCache[rec.id] = { loading: true };
      notifyAIListeners();
      try {
        const result = await analyzeStockWithClaude(rec, apiKey);
        window.__aiAnalysisCache[rec.id] = { loading: false, data: result };
      } catch (err) {
        window.__aiAnalysisCache[rec.id] = { loading: false, error: err.message };
      }
      notifyAIListeners();
      if (onProgress) onProgress();
    }));
  }
}

Object.assign(window, {
  LiveDataContext, LiveDataProvider, useAIAnalysis, analyzeAllStocks, analyzeStockWithClaude, notifyAIListeners,
  fetchCoinGeckoMarkets

</script>

function PortfolioScreen({ onOpenDetail }) {
  const enriched = PORTFOLIO.map(p => {
    const value = p.qty * p.current;
    const invested = p.qty * p.avg;
    const pnl = value - invested;
    const ret = (pnl / invested) * 100;
    return { ...p, value, invested, pnl, ret };
  });

  const totalsByCcy = enriched.reduce((acc, p) => {
    if (!acc[p.currency]) acc[p.currency] = { value: 0, invested: 0, pnl: 0 };
    acc[p.currency].value += p.value;
    acc[p.currency].invested += p.invested;
    acc[p.currency].pnl += p.pnl;
    return acc;
  }, {});

  return (
    <div>
      <div className="hero">
        <div>
          <div className="hero-eyebrow">Portfolio</div>
          <h1>Your <em>positions</em>, all in one view.</h1>
        </div>
      </div>

      <div className="portfolio-summary">
        <div className="ps-cell">
          <div className="lbl">Total Value (INR)</div>
          <div className="val large">₹{totalsByCcy["₹"]?.value.toLocaleString("en-IN", { maximumFractionDigits: 0 }) || 0}</div>
          <div className={`sub ${totalsByCcy["₹"]?.pnl >= 0 ? "up" : "dn"}`}>
            {totalsByCcy["₹"]?.pnl >= 0 ? "+" : ""}₹{totalsByCcy["₹"]?.pnl.toLocaleString("en-IN", { maximumFractionDigits: 0 })} ({((totalsByCcy["₹"]?.pnl / totalsByCcy["₹"]?.invested) * 100).toFixed(1)}%)
          </div>
        </div>
        <div className="ps-cell">
          <div className="lbl">USD Positions</div>
          <div className="val">${totalsByCcy["$"]?.value.toLocaleString("en-US", { maximumFractionDigits: 0 }) || 0}</div>
          <div className={`sub ${totalsByCcy["$"]?.pnl >= 0 ? "up" : "dn"}`}>
            {totalsByCcy["$"]?.pnl >= 0 ? "+" : ""}${totalsByCcy["$"]?.pnl.toLocaleString("en-US", { maximumFractionDigits: 0 })}
          </div>
        </div>
        <div className="ps-cell">
          <div className="lbl">Day P/L</div>
          <div className="val up">+₹14,820</div>
          <div className="sub up">+0.84% today</div>
        </div>
        <div className="ps-cell">
          <div className="lbl">Open Positions</div>
          <div className="val">{enriched.length}</div>
          <div className="sub">across 3 markets</div>
        </div>
      </div>

      <table className="screener-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Market</th>
            <th>Qty</th>
            <th>Avg Buy</th>
            <th>Live</th>
            <th>Value</th>
            <th>P/L</th>
            <th>Return</th>
            <th>Signal</th>
          </tr>
        </thead>
        <tbody>
          {enriched.map((p, i) => {
            const rec = RECOMMENDATIONS.find(r => r.symbol === p.symbol);
            return (
              <tr key={i} onClick={() => rec && onOpenDetail(rec)} style={{ cursor: "pointer" }}>
                <td><div style={{ fontWeight: 600 }}>{p.symbol}</div></td>
                <td><span className="tagchip">{p.market}</span></td>
                <td className="num">{p.qty}</td>
                <td className="num">{p.currency}{p.avg.toLocaleString()}</td>
                <td className="num">{p.currency}{p.current.toLocaleString()}</td>

  "COALINDIA.NS","ASIANPAINT.NS","GRASIM.NS","EICHERMOT.NS","BPCL.NS",
  "APOLLOHOSP.NS","HEROMOTOCO.NS","BRITANNIA.NS","BAJAJ-AUTO.NS","SBILIFE.NS",
  "HDFCLIFE.NS","HINDALCO.NS","M&M.NS","TATACONSUM.NS","UPL.NS"
];

function ScreenerScreen({ onOpenDetail }) {
  const [sortBy, setSortBy] = useS("confidence");
  const [filter, setFilter] = useS("all");
  const [nseData, setNseData] = useS(null);
  const [nseLoading, setNseLoading] = useS(false);
  const [nseError, setNseError] = useS(null);
  const [showNse, setShowNse] = useS(false);

  const data = useM(() => {
    let r = [...RECOMMENDATIONS];
    if (filter !== "all") r = r.filter(x => x.market === filter);
    r.sort((a, b) => {
      if (sortBy === "confidence") return b.confidence - a.confidence;
      if (sortBy === "upside") return Math.abs(b.upside) - Math.abs(a.upside);
      if (sortBy === "change") return b.change - a.change;
      if (sortBy === "rr") return b.rr - a.rr;
      return 0;
    });
    return r;
  }, [sortBy, filter]);

  const loadNseData = async () => {
    setNseLoading(true);
    setNseError(null);
    try {
      const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${NIFTY50_SYMBOLS.join(",")}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const quotes = json?.quoteResponse?.result || [];
      const mapped = quotes.map(q => ({
        symbol: q.symbol.replace(".NS", ""),
        name: q.longName || q.shortName || q.symbol,
        price: q.regularMarketPrice,
        change: q.regularMarketChangePercent,
        volume: q.regularMarketVolume,
        marketCap: q.marketCap,
        pe: q.trailingPE || q.forwardPE || null,
        high52: q.fiftyTwoWeekHigh,
        low52: q.fiftyTwoWeekLow
      }));
      setNseData(mapped);
      setShowNse(true);
    } catch (err) {
      setNseError(err.message);
    }
    setNseLoading(false);
  };

  const fmtVol = (v) => {
    if (!v) return "—";
    if (v >= 1e7) return (v / 1e7).toFixed(2) + " Cr";
    if (v >= 1e5) return (v / 1e5).toFixed(2) + " L";
    return v.toLocaleString();
  };
  const fmtMktCap = (v) => {
    if (!v) return "—";
    const cr = v / 1e7;
    if (cr >= 1e5) return (cr / 1e5).toFixed(1) + "L Cr";
    if (cr >= 1000) return Math.round(cr / 1000) + "K Cr";
    return Math.round(cr) + " Cr";
  };

  return (
    <div>
      <div className="hero">
        <div>
          <div className="hero-eyebrow">Screener</div>
          <h1>Find your next <em>position</em>.</h1>
        </div>
      </div>

      <div className="filter-bar">
        <button className={`chip ${filter === "all" ? "active" : ""}`} onClick={() => setFilter("all")}>All</button>
        <button className={`chip ${filter === "IN" ? "active" : ""}`} onClick={() => setFilter("IN")}>Indian</button>
        <button className={`chip ${filter === "US" ? "active" : ""}`} onClick={() => setFilter("US")}>US</button>
        <button className={`chip ${filter === "CRYPTO" ? "active" : ""}`} onClick={() => setFilter("CRYPTO")}>Crypto</button>
        <div className="chip-divider"></div>
        <span style={{ fontSize: 11, color: "var(--t-3)", marginRight: 4, fontFamily: "var(--font-mono)" }}>SORT</span>
        <button className={`chip ${sortBy === "confidence" ? "active" : ""}`} onClick={() => setSortBy("confidence")}>Confidence</button>
        <button className={`chip ${sortBy === "upside" ? "active" : ""}`} onClick={() => setSortBy("upside")}>Upside</button>
        <button className={`chip ${sortBy === "rr" ? "active" : ""}`} onClick={() => setSortBy("rr")}>R:R</button>
        <button className={`chip ${sortBy === "change" ? "active" : ""}`} onClick={() => setSortBy("change")}>Today's Move</button>
        <button
          className="chip"
          onClick={loadNseData}
          disabled={nseLoading}
          style={{ marginLeft: 8, background: "rgba(52,211,153,0.1)", color: "#34d399", borderColor: "#34d39944" }}
        >
          {nseLoading ? "⟳ Loading…" : "🔄 Load Live NSE Data"}
        </button>
      </div>

      {nseError && (
        <div style={{ margin: "8px 0 12px", padding: "10px 16px", background: "var(--sell-w)", color: "var(--sell)", borderRadius: 8, fontSize: 12, fontFamily: "var(--font-mono)" }}>
          NSE fetch error: {nseError}
        </div>
      )}

      {showNse && nseData && (
        <div style={{ marginBottom: 32 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--t-1)" }}>
              Nifty 50 — Live NSE Data
            </div>
            <span style={{ fontSize: 11, color: "#34d399", fontFamily: "var(--font-mono)" }}>● LIVE</span>
            <button className="iconbtn" style={{ marginLeft: "auto", fontSize: 11 }} onClick={() => setShowNse(false)}>✕ Hide</button>
          </div>
          <table className="screener-table">
            <thead>
              <tr>
                <th>Symbol</th>
                <th>Name</th>
                <th>Price (₹)</th>
                <th>Change%</th>
                <th>Volume</th>
                <th>Mkt Cap</th>
                <th>P/E</th>
                <th>52W High</th>
                <th>52W Low</th>
                <th>Picks</th>
              </tr>
            </thead>
            <tbody>
              {nseData.map(row => {
                const matchRec = RECOMMENDATIONS.find(r => r.symbol === row.symbol);
                return (
                  <tr key={row.symbol} style={{ cursor: matchRec ? "pointer" : "default" }}
                    onClick={() => matchRec && onOpenDetail(matchRec)}>
                    <td style={{ fontWeight: 700 }}>{row.symbol}</td>
                    <td style={{ fontSize: 11, color: "var(--t-2)", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.name}</td>
                    <td className="num">₹{row.price?.toLocaleString("en-IN", { maximumFractionDigits: 2 }) || "—"}</td>
                    <td className={`num ${row.change >= 0 ? "up" : "dn"}`}>{row.change != null ? (row.change > 0 ? "+" : "") + row.change.toFixed(2) + "%" : "—"}</td>
                    <td className="num" style={{ fontSize: 11 }}>{fmtVol(row.volume)}</td>
                    <td className="num" style={{ fontSize: 11 }}>{fmtMktCap(row.marketCap)}</td>
                    <td className="num">{row.pe ? row.pe.toFixed(1) : "—"}</td>
                    <td className="num up">{row.high52 ? "₹" + row.high52.toLocaleString("en-IN", { maximumFractionDigits: 0 }) : "—"}</td>
                    <td className="num dn">{row.low52 ? "₹" + row.low52.toLocaleString("en-IN", { maximumFractionDigits: 0 }) : "—"}</td>
                    <td>{matchRec
                      ? <span className={`action-badge ${matchRec.action.toLowerCase()}`} style={{ cursor: "pointer" }}>{matchRec.action}</span>
                      : <span style={{ color: "var(--t-4)", fontSize: 11 }}>—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      <div style={{ marginBottom: 12, fontSize: 13, fontWeight: 600, color: "var(--t-1)" }}>
        Bullseye Recommendations
      </div>
      <table className="screener-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Action</th>
            <th>Price</th>
            <th>Today</th>
            <th>Entry</th>
            <th>T1</th>
            <th>T2</th>
            <th>T3</th>
            <th>Stop</th>
            <th>R:R</th>
            <th>Conf</th>
            <th>Risk</th>
            <th>Horizon</th>
          </tr>
        </thead>
        <tbody>
          {data.map(r => (
            <tr key={r.id} onClick={() => onOpenDetail(r)} style={{ cursor: "pointer" }}>
              <td>
                <div className="sym-cell">
                  <div className={`wl-mini-logo`} style={{
                    background: r.market === "CRYPTO" ? "#f7931a22" : r.market === "US" ? "#4480ff22" : "#d4a04a22",
                    color: r.market === "CRYPTO" ? "#f7931a" : r.market === "US" ? "#6fa0ff" : "var(--brand)"
                  }}>{r.symbol.slice(0, 2)}</div>
                  <div>
                    <div style={{ fontWeight: 600 }}>{r.symbol}</div>
                    <div style={{ fontSize: 10, color: "var(--t-3)" }}>{r.exchange}</div>
                  </div>
                </div>
              </td>
              <td><span className={`action-badge ${r.action.toLowerCase()}`}>{r.action}</span></td>
              <td className="num">{fmtPrice(r.price, r.currency)}</td>
              <td className={`num ${r.change >= 0 ? "up" : "dn"}`}>{fmtChange(r.change)}</td>
              <td className="num" style={{ fontSize: 11 }}>{r.currency}{r.entry.low}–{r.entry.high}</td>
              <td className="num up">{fmtPrice(r.targets[0], r.currency)}</td>
              <td className="num" style={{ color: "var(--brand)" }}>{fmtPrice(r.targets[1], r.currency)}</td>
              <td className="num" style={{ color: "#6fa0ff" }}>{fmtPrice(r.targets[2], r.currency)}</td>
              <td className="num dn">{fmtPrice(r.stopLoss, r.currency)}</td>
              <td><span className="rr-chip">{r.rr}:1</span></td>
              <td className="num">{r.confidence}%</td>
              <td><span className={`risk-chip risk-${r.risk.replace(" ", "-")}`}>{r.risk}</span></td>
              <td style={{ fontSize: 11, color: "var(--t-2)" }}>{r.horizon}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function SettingsScreen() {
  const [apiKeyInput, setApiKeyInput] = useS(() => {
    try { return localStorage.getItem("bullseye_anthropic_key") || ""; } catch { return ""; }
  });
  const [apiKeyMasked, setApiKeyMasked] = useS(true);
  const [apiKeySaved, setApiKeySaved] = useS(() => {
    try { return !!localStorage.getItem("bullseye_anthropic_key"); } catch { return false; }
  });
  const [apiKeySaveMsg, setApiKeySaveMsg] = useS("");

  const handleSaveKey = () => {
    try {
      if (apiKeyInput.trim()) {
        localStorage.setItem("bullseye_anthropic_key", apiKeyInput.trim());
        setApiKeySaved(true);
        setApiKeySaveMsg("API key saved successfully.");
      } else {
        localStorage.removeItem("bullseye_anthropic_key");
        setApiKeySaved(false);
        setApiKeySaveMsg("API key removed.");
      }
      setTimeout(() => setApiKeySaveMsg(""), 3000);
    } catch (e) {
      setApiKeySaveMsg("Error saving key: " + e.message);
    }
  };

  return (
    <div>
      <div className="hero">

<script type="text/babel">
/* global React, fmtPrice, fmtChange, LiveDataContext */
// ====================================================================
// FREE AI COUNCIL — Gemini, Claude
// ====================================================================

// ---------- helpers ----------
const GEMINI_KEY = "AIzaSyDsfyiPJKoORXlraWSlbAi1D7muG-r6Jns";

function getFreeAIKeys() {
  return { gemini: GEMINI_KEY, groq: "", openrouter: "", claude: "" };
}

function extractJSON(text) {
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON found in response");
  return JSON.parse(m[0]);
}

function buildStockPrompt(rec, displayPrice, displayChange) {
  return `You are a stock market expert. Analyze ${rec.name} (${rec.symbol}) currently trading at ${rec.currency}${displayPrice} (change: ${displayChange.toFixed(2)}%).

Give a STRICT JSON response only (no markdown, no extra text):
{
  "verdict": "BUY",
  "confidence": 7,
  "entry_price": ${displayPrice},
  "target_price": ${rec.targets[0]},
  "stop_loss": ${rec.stopLoss},
  "reasoning": "max 2 sentences",
  "time_horizon": "Short-term (1-4 weeks)"
}

verdict must be exactly "BUY", "SELL", or "HOLD". confidence is 1-10. time_horizon must be "Intraday", "Short-term (1-4 weeks)", or "Medium-term (1-3 months)".`;
}

async function callGemini(prompt, apiKey) {
  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-goog-api-key": apiKey },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if (!res.ok) {
    const err = await res.text();
    if (res.status === 429) throw new Error("Rate limited — try again in 60s");
    throw new Error(`Gemini error ${res.status}`);
  }
  const data = await res.json();
  return extractJSON(data.candidates[0].content.parts[0].text);
}

async function callGroq(prompt, apiKey) {
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }], max_tokens: 500 })
  });
  if (!res.ok) {
    if (res.status === 429) throw new Error("Rate limited — try again in 60s");
    throw new Error(`Groq error ${res.status}`);
  }
  const data = await res.json();
  return extractJSON(data.choices[0].message.content);
}

async function callOpenRouter(prompt, apiKey) {
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${apiKey}`,
      "Content-Type": "application/json",
      "HTTP-Referer": "https://bullseye.app",
      "X-Title": "Bullseye"
    },
    body: JSON.stringify({ model: "mistralai/mistral-7b-instruct:free", messages: [{ role: "user", content: prompt }], max_tokens: 500 })
  });
  if (!res.ok) {
    if (res.status === 429) throw new Error("Rate limited — try again in 60s");
    throw new Error(`OpenRouter error ${res.status}`);
  }
  const data = await res.json();
  return extractJSON(data.choices[0].message.content);
}

async function callClaudeForCouncil(prompt, apiKey) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 500,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) {
    if (res.status === 429) throw new Error("Rate limited — try again in 60s");
    throw new Error(`Claude error ${res.status}`);
  }
  const data = await res.json();
  return extractJSON(data.content[0].text);
}

async function runAICouncil(rec, displayPrice, displayChange) {
  const keys = getFreeAIKeys();
  const prompt = buildStockPrompt(rec, displayPrice, displayChange);
  const results = {};

  const tasks = [];
  if (keys.gemini)     tasks.push(["gemini",   callGemini(prompt, keys.gemini)]);
  if (keys.claude)     tasks.push(["claude",    callClaudeForCouncil(prompt, keys.claude)]);

  const settled = await Promise.allSettled(tasks.map(([, p]) => p));
  tasks.forEach(([name], i) => {
    const r = settled[i];
    results[name] = r.status === "fulfilled" ? { ok: true, data: r.value } : { ok: false, error: r.reason.message };
  });
  return results;
}

// ---------- AI Council Modal ----------
function AIPill({ name }) {
  const cls = { gemini: "gemini", groq: "groq", mistral: "mistral", claude: "claude" }[name] || "claude";
  const labels = { gemini: "Gemini", groq: "Groq", mistral: "Mistral", claude: "Claude" };
  return <span className={`ai-pill ${cls}`}>{labels[name] || name}</span>;
}

function CouncilColumn({ name, result, loading }) {
  if (loading) {
    return (
      <div className="council-col loading">
        <AIPill name={name} />
        <div className="skeleton-block" style={{ height: 28, marginTop: 12, marginBottom: 8 }} />
        <div className="skeleton-block" style={{ height: 4, marginBottom: 8 }} />
        <div className="skeleton-block" style={{ height: 60 }} />
      </div>
    );
  }
  if (!result || !result.ok) {
    return (
      <div className="council-col">
        <AIPill name={name} />
        <div className="council-verdict unavailable">{result?.error || "unavailable"}</div>
      </div>
    );
  }
  const d = result.data;
  const vClass = ["BUY","SELL","HOLD"].includes(d.verdict) ? d.verdict : "unavailable";
  return (
    <div className="council-col">
      <AIPill name={name} />
      <div className={`council-verdict ${vClass}`}>{d.verdict}</div>
      <div style={{ fontSize: 11, color: "var(--t-3)", fontFamily: "var(--font-mono)" }}>confidence: {d.confidence}/10</div>
      <div className="council-conf-bar">
        <div className="council-conf-fill" style={{ width: `${(d.confidence / 10) * 100}%` }} />
      </div>
      {d.entry_price != null && (
        <div className="council-detail-row"><span>Entry</span><span className="council-detail-val">{d.entry_price?.toLocaleString?.() ?? d.entry_price}</span></div>
      )}
      {d.target_price != null && (
        <div className="council-detail-row"><span>Target</span><span className="council-detail-val up">{d.target_price?.toLocaleString?.() ?? d.target_price}</span></div>
      )}
      {d.stop_loss != null && (
        <div className="council-detail-row"><span>SL</span><span className="council-detail-val dn">{d.stop_loss?.toLocaleString?.() ?? d.stop_loss}</span></div>
      )}
      {d.time_horizon && (
        <div className="council-detail-row"><span>Horizon</span><span className="council-detail-val" style={{ fontSize: 9 }}>{d.time_horizon}</span></div>
      )}
      {d.reasoning && <div className="council-reason">{d.reasoning}</div>}
    </div>
  );
}

function CouncilConsensus({ results }) {
  const verdicts = Object.values(results).filter(r => r?.ok).map(r => r.data.verdict);
  if (!verdicts.length) return null;
  const counts = {};
  verdicts.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  if (!top) return null;
  const [verdict, count] = top;
  const total = verdicts.length;
  const isStrong = count === total && total >= 3;
  return (
    <div className={`council-consensus ${isStrong ? "strong" : ""}`}>
      {isStrong && <div className="consensus-fire">🔥 STRONG CONSENSUS</div>}
      <div className="consensus-label">AI Council Consensus</div>
      <div className={`consensus-verdict ${verdict}`}>{verdict}</div>
      <div className="consensus-count">{count} of {total} AIs agree</div>
    </div>
  );
}

function AICouncilModal({ rec, displayPrice, displayChange, onClose }) {
  const [loading, setLoading] = React.useState(true);
  const [results, setResults] = React.useState({});
  const [activeNames, setActiveNames] = React.useState([]);

  React.useEffect(() => {
    const keys = getFreeAIKeys();
    const names = [];
    if (keys.gemini)     names.push("gemini");
    if (keys.claude)     names.push("claude");
    setActiveNames(names);

    const init = {};
    names.forEach(n => { init[n] = null; });
    setResults(init);

    runAICouncil(rec, displayPrice, displayChange).then(r => {
      setResults(r);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  return (
    <div className="council-modal-bg" onClick={onClose}>
      <div className="council-modal" onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 4 }}>
          <div>
            <div className="council-modal-title">🤖 AI Council</div>
            <div className="council-modal-sub">{rec.name} ({rec.symbol}) · {rec.currency}{displayPrice?.toLocaleString?.() ?? displayPrice} · {displayChange >= 0 ? "+" : ""}{displayChange.toFixed(2)}%</div>
          </div>

async function fetchTopPicksFromAI(aiName, apiKey) {
  const prompt = buildTopPicksPrompt();
  let raw;
  if (aiName === "gemini")  raw = await callGemini(prompt, apiKey);
  else if (aiName === "groq")   raw = await callGroq(prompt, apiKey);
  else if (aiName === "mistral") raw = await callOpenRouter(prompt, apiKey);
  else if (aiName === "claude")  raw = await callClaudeForCouncil(prompt, apiKey);

function buildAveragingPrompt(rec, displayPrice, displayChange, buyPrice, qty) {
  const pl = (displayPrice - buyPrice) * qty;
  const plPct = ((displayPrice - buyPrice) / buyPrice) * 100;
  return `Stock: ${rec.name} (${rec.symbol})
Current Price: ${rec.currency}${displayPrice} (Change: ${displayChange.toFixed(2)}%)
User's buy price: ${rec.currency}${buyPrice}
User's quantity: ${qty} shares
User's avg cost: ${rec.currency}${buyPrice} (same as buy price for first purchase)
Current P&L: ${rec.currency}${pl.toFixed(2)} (${plPct.toFixed(2)}%)

Should the user:
1. Buy more to average down (if current < buy price)
2. Buy more to pyramid up (if current > buy price, momentum play)
3. Hold current position
4. Set a stop loss and exit

Respond STRICT JSON only:
{
  "action": "AVERAGE_DOWN",
  "reason": "2-3 sentence explanation",
  "add_qty": 0,
  "add_at_price": null,
  "new_avg_price": ${buyPrice},
  "revised_target": ${rec.targets?.[0] ?? displayPrice * 1.1},
  "revised_stop_loss": ${rec.stopLoss ?? displayPrice * 0.9},
  "confidence": 7
}

action must be exactly one of: "AVERAGE_DOWN", "PYRAMID_UP", "HOLD", "EXIT".`;
}

async function runAveragingAdvisor(rec, displayPrice, displayChange, buyPrice, qty) {
  const keys = getFreeAIKeys();
  const prompt = buildAveragingPrompt(rec, displayPrice, displayChange, buyPrice, qty);
  const results = {};
  const tasks = [];
  if (keys.gemini)     tasks.push(["gemini",  callGemini(prompt, keys.gemini)]);
  if (keys.claude)     tasks.push(["claude",  callClaudeForCouncil(prompt, keys.claude)]);

  const settled = await Promise.allSettled(tasks.map(([,p]) => p));
  tasks.forEach(([name], i) => {
    const r = settled[i];
    results[name] = r.status === "fulfilled" ? { ok: true, data: r.value } : { ok: false, error: r.reason.message };
  });
  return results;
}

function AveragingAssistant({ rec, displayPrice, displayChange }) {
  const [open, setOpen] = React.useState(false);
  const [buyPrice, setBuyPrice] = React.useState("");
  const [qty, setQty] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [adviceResults, setAdviceResults] = React.useState(null);
  const [error, setError] = React.useState(null);

  const keys = getFreeAIKeys();
  const hasKeys = keys.gemini || keys.claude;

  const handleSubmit = async () => {
    const bp = parseFloat(buyPrice);
    const q = parseFloat(qty);
    if (!bp || !q || bp <= 0 || q <= 0) {
      setError("Please enter valid buy price and quantity.");
      return;
    }
    setLoading(true);
    setError(null);
    try {
      const results = await runAveragingAdvisor(rec, displayPrice, displayChange, bp, q);
      setAdviceResults({ results, buyPrice: bp, qty: q });
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  };

  // Compute consensus from results
  let consensus = null;
  let agreeCount = 0;
  let totalCount = 0;
  let primaryResult = null;
  if (adviceResults?.results) {
    const okResults = Object.values(adviceResults.results).filter(r => r?.ok);
    totalCount = okResults.length;
    if (totalCount > 0) {
      const actionCounts = {};
      okResults.forEach(r => { actionCounts[r.data.action] = (actionCounts[r.data.action] || 0) + 1; });
      const top = Object.entries(actionCounts).sort((a,b) => b[1]-a[1])[0];
      consensus = { action: top[0], count: top[1] };
      agreeCount = top[1];
      primaryResult = okResults.find(r => r.data.action === top[0])?.data;
    }
  }

  const bp = adviceResults?.buyPrice;
  const q = adviceResults?.qty;
  const pl = bp && q ? (displayPrice - bp) * q : null;
  const plPct = bp ? ((displayPrice - bp) / bp) * 100 : null;

  const ACTION_LABELS = {
    AVERAGE_DOWN: "📉 AVERAGE DOWN",
    PYRAMID_UP:   "📈 PYRAMID UP",
    HOLD:         "⏸ HOLD",
    EXIT:         "🚨 EXIT NOW",
  };

  return (
    <div className="position-section">
      <div className="position-toggle" onClick={() => setOpen(o => !o)}>
        <h3>📊 My Position <span style={{ color: "var(--brand)" }}>(Averaging Advisor)</span></h3>
        <span style={{ color: "var(--t-3)", fontSize: 16 }}>{open ? "▲" : "▼"}</span>
      </div>

      {open && (
        <div className="position-form">
          {!hasKeys && (
            <div style={{ padding: "10px 12px", background: "rgba(168,85,247,0.08)", border: "1px solid rgba(168,85,247,0.25)", borderRadius: 8, fontSize: 12, color: "#c084fc", fontFamily: "var(--font-mono)" }}>
              Add free AI keys in Profile → Settings to enable averaging advice.
            </div>
          )}
          <div className="position-input-row">
            <div className="position-input-group">
              <label className="position-label">I bought at ({rec.currency})</label>
              <input className="position-input" type="number" placeholder={rec.price} value={buyPrice}
                onChange={e => setBuyPrice(e.target.value)} />
            </div>
            <div className="position-input-group">
              <label className="position-label">Quantity (shares)</label>
              <input className="position-input" type="number" placeholder="100" value={qty}
                onChange={e => setQty(e.target.value)} />
            </div>
          </div>

          {buyPrice && qty && parseFloat(buyPrice) > 0 && parseFloat(qty) > 0 && (
            <div style={{ display: "flex", gap: 12 }}>
              {(() => {
                const curPL = (displayPrice - parseFloat(buyPrice)) * parseFloat(qty);
                const curPct = ((displayPrice - parseFloat(buyPrice)) / parseFloat(buyPrice)) * 100;
                const isProfit = curPL >= 0;
                return (
                  <>
                    <div className="avg-pnl-cell" style={{ flex: 1 }}>
                      <div className="avg-pnl-label">CURRENT P&L</div>
                      <div className={`avg-pnl-val ${isProfit ? "profit" : "loss"}`}>{isProfit ? "+" : ""}{rec.currency}{Math.abs(curPL).toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                    </div>
                    <div className="avg-pnl-cell" style={{ flex: 1 }}>
                      <div className="avg-pnl-label">RETURN</div>
                      <div className={`avg-pnl-val ${isProfit ? "profit" : "loss"}`}>{isProfit ? "+" : ""}{curPct.toFixed(2)}%</div>
                    </div>
                  </>
                );
              })()}
            </div>
          )}

          <button className="avg-advice-btn" onClick={handleSubmit} disabled={loading || !hasKeys}>
            {loading ? "⟳ Getting AI advice…" : "📊 Get Averaging Advice"}
          </button>

          {error && <div style={{ color: "var(--sell)", fontSize: 12, fontFamily: "var(--font-mono)" }}>{error}</div>}

          {adviceResults && primaryResult && consensus && (
            <div className="avg-result">
              <div className={`avg-action-badge ${consensus.action}`}>
                {ACTION_LABELS[consensus.action] || consensus.action}
              </div>

              {(consensus.action === "AVERAGE_DOWN" || consensus.action === "PYRAMID_UP") && primaryResult.add_qty > 0 && (
                <div className="avg-detail-row">
                  Buy <strong>{primaryResult.add_qty} more shares</strong>
                  {primaryResult.add_at_price && <> at <strong>{rec.currency}{primaryResult.add_at_price?.toLocaleString?.()}</strong></>}
                  {primaryResult.new_avg_price && <> → New avg: <strong>{rec.currency}{primaryResult.new_avg_price?.toLocaleString?.()}</strong></>}
                </div>
              )}

              {consensus.action === "EXIT" && (
                <div className="avg-detail-row">
                  Exit at <strong>{rec.currency}{displayPrice?.toLocaleString?.()}</strong>
                  {pl !== null && <> → {pl >= 0 ? "Lock in gain" : "Cut loss"}: <strong style={{ color: pl >= 0 ? "#00e676" : "#ff5252" }}>{pl >= 0 ? "+" : ""}{rec.currency}{Math.abs(pl).toLocaleString(undefined, { maximumFractionDigits: 0 })}</strong></>}
                </div>
              )}

              {primaryResult.reason && (
                <div style={{ fontSize: 12, color: "var(--t-2)", marginTop: 8, lineHeight: 1.6 }}>{primaryResult.reason}</div>
              )}

              {primaryResult.revised_target && (
                <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                  <div className="avg-pnl-cell" style={{ flex: 1 }}>
                    <div className="avg-pnl-label">REVISED TARGET</div>
                    <div className="avg-pnl-val profit">{rec.currency}{primaryResult.revised_target?.toLocaleString?.()}</div>
                  </div>
                  {primaryResult.revised_stop_loss && (
                    <div className="avg-pnl-cell" style={{ flex: 1 }}>
                      <div className="avg-pnl-label">REVISED STOP</div>
                      <div className="avg-pnl-val loss">{rec.currency}{primaryResult.revised_stop_loss?.toLocaleString?.()}</div>
                    </div>
                  )}
                </div>
              )}

              <div className="avg-agree-bar">
                <span>{agreeCount} of {totalCount} AIs agree</span>
                <div className="avg-agree-track">
                  <div className="avg-agree-fill" style={{ width: totalCount > 0 ? `${(agreeCount/totalCount)*100}%` : "0%" }} />
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function FreeAIKeysSection() {

    try { return localStorage.getItem(lsKey) || ""; } catch { return ""; }
  };

  const [geminiKey,    setGeminiKey]    = React.useState(mkState("bullseye_gemini_key"));
  const [geminiShow,   setGeminiShow]   = React.useState(false);
  const [msgs,         setMsgs]         = React.useState({});

  const saveKey = (lsKey, val, msgKey) => {
    try {
      if (val.trim()) localStorage.setItem(lsKey, val.trim());
      else localStorage.removeItem(lsKey);
      setMsgs(m => ({ ...m, [msgKey]: val.trim() ? "✓ Saved" : "Removed" }));
      setTimeout(() => setMsgs(m => ({ ...m, [msgKey]: "" })), 2000);
    } catch (e) {
      setMsgs(m => ({ ...m, [msgKey]: "Error: " + e.message }));
    }
  };

  const configured = geminiKey.trim() ? 1 : 0;

  const aiRows = [
    {
      label: "Gemini (Google)",
      sub: "gemini-3-flash-preview · Free · No credit card needed",
      link: "https://ai.google.dev",
      linkLabel: "Get free key → ai.google.dev",
      pill: "gemini",
      value: geminiKey, setValue: setGeminiKey,
      show: geminiShow, setShow: setGeminiShow,
      lsKey: "bullseye_gemini_key", msgKey: "gemini"
    },
  ];

  return (
    <div className="free-ai-section" style={{ marginBottom: 20 }}>
      <div className="free-ai-header">
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "var(--t-1)", display: "flex", alignItems: "center", gap: 8 }}>
            ✦ Gemini AI (Google)
          </div>
          <div style={{ fontSize: 11, color: "var(--t-3)", marginTop: 3, fontFamily: "var(--font-mono)" }}>
            Free · No credit card · Works alongside Claude
          </div>
        </div>
        <span className={`free-ai-status-pill ${configured > 0 ? "some" : "none"}`}>
          {configured > 0 ? "✓ Gemini configured" : "Not configured"}
        </span>
      </div>

      {aiRows.map(row => (
        <div className="free-ai-row" key={row.msgKey}>
          <div className="free-ai-row-header">
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <AIPill name={row.pill} />
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{row.label}</div>
                <div style={{ fontSize: 11, color: "var(--t-3)", fontFamily: "var(--font-mono)" }}>{row.sub}</div>
              </div>
            </div>
            <a href={row.link} target="_blank" rel="noopener noreferrer"
               style={{ fontSize: 11, color: "var(--brand)", fontFamily: "var(--font-mono)", textDecoration: "none" }}>
              {row.linkLabel} ↗
            </a>
          </div>
          <div className="free-ai-row-inputs">
            <input
              type={row.show ? "text" : "password"}
              value={row.value}
              onChange={e => row.setValue(e.target.value)}
              placeholder="Paste your API key here…"
              style={{
                flex: 1, background: "var(--surface-2)", border: "1px solid var(--border-2)",
                borderRadius: 8, padding: "9px 12px", color: "var(--t-1)",
                fontFamily: "var(--font-mono)", fontSize: 12, outline: "none"
              }}
            />
            <button className="btn-secondary" onClick={() => row.setShow(s => !s)} style={{ flexShrink: 0 }}>
              {row.show ? "Hide" : "Show"}
            </button>
            <button className="btn-primary" onClick={() => saveKey(row.lsKey, row.value, row.msgKey)} style={{ flexShrink: 0 }}>
              Save
            </button>
          </div>
          {msgs[row.msgKey] && (
            <div style={{ fontSize: 11, color: msgs[row.msgKey].startsWith("✓") ? "var(--buy)" : "var(--sell)", fontFamily: "var(--font-mono)" }}>

            </div>
          )}
        </div>
      ))}
    </div>
  );
}

<script type="text/babel">
/* global React, fmtPrice, fmtChange, LiveDataContext, RECOMMENDATIONS, ALERTS_DATA, NEWS_ITEMS */

// ====================================================================

// ---- FEATURE 1: Technical Analysis Engine ----
window.__techCache = window.__techCache || {};

function calcEMA(data, period) {
  if (data.length < period) return null;
  const k = 2 / (period + 1);
  let ema = data.slice(0, period).reduce((s, v) => s + v, 0) / period;
  for (let i = period; i < data.length; i++) {
    ema = data[i] * k + ema * (1 - k);
  }
  return ema;
}

function calcEMAArray(data, period) {
  if (data.length < period) return [];
  const k = 2 / (period + 1);
  const result = new Array(period - 1).fill(null);
  let ema = data.slice(0, period).reduce((s, v) => s + v, 0) / period;
  result.push(ema);
  for (let i = period; i < data.length; i++) {
    ema = data[i] * k + ema * (1 - k);
    result.push(ema);
  }
  return result;
}

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - 100 / (1 + rs);
}

async function fetchTechnicalData(symbol) {
  const cached = window.__techCache[symbol];
  if (cached && (Date.now() - cached.fetchedAt) < 5 * 60 * 1000) {
    return cached.data;
  }

  try {
    const NSE_LOOKUP = ["RELIANCE","HDFCBANK","TATAMOTORS","INFY","ADANIGREEN","POLYCAB","ZOMATO","SBIN","IRFC","TRENT","DIXON","TCS","BHARTIARTL","ICICIBANK","INFOSYS","LICI","HINDUNILVR","ITC","BAJFINANCE","KOTAKBANK","LT","LTIM","HCLTECH","MARUTI","SUNPHARMA","TITAN","WIPRO","ULTRACEMCO","ONGC","NTPC","POWERGRID","NESTLEIND","TATASTEEL","AXISBANK","INDUSINDBK","BAJAJFINSV","TECHM","DRREDDY","ADANIENT","ADANIPORTS","CIPLA","JSWSTEEL","DIVISLAB","COALINDIA","ASIANPAINT","GRASIM","EICHERMOT","BPCL","APOLLOHOSP","HEROMOTOCO","BRITANNIA","SBILIFE","HDFCLIFE","HINDALCO","TATACONSUM","UPL","PERSISTENT","TATAPOWER","IDFCFIRSTB"];
    const yahooSym = symbol.includes('.') ? symbol : (
      NSE_LOOKUP.includes(symbol) ? symbol + ".NS" : symbol
    );
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${yahooSym}?interval=1d&range=3mo&includePrePost=false`;
    const res = await fetch(url, { mode: 'cors' });
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    const result = json?.chart?.result?.[0];
    if (!result) throw new Error('no data');

    const q = result.indicators.quote[0];
    const closes = q.close.filter(v => v != null);
    const highs = q.high.filter(v => v != null);
    const lows = q.low.filter(v => v != null);
    const volumes = q.volume.filter(v => v != null);

    if (closes.length < 20) throw new Error('insufficient data');

    const price = closes[closes.length - 1];

    // RSI(14)
    const rsi = calcRSI(closes, 14);

    // SMA50, SMA200
    const sma = (arr, n) => arr.length >= n ? arr.slice(-n).reduce((s,v) => s+v, 0) / n : null;
    const sma50 = sma(closes, 50);
    const sma200 = sma(closes, 200);

    // MACD
    const ema12Arr = calcEMAArray(closes, 12);
    const ema26Arr = calcEMAArray(closes, 26);
    const macdLine = [];
    for (let i = 0; i < closes.length; i++) {
      if (ema12Arr[i] != null && ema26Arr[i] != null) {
        macdLine.push(ema12Arr[i] - ema26Arr[i]);
      }
    }
    const macdSignalLine = calcEMAArray(macdLine, 9);
    const lastMacd = macdLine.length > 0 ? macdLine[macdLine.length - 1] : 0;
    const lastSignal = macdSignalLine.length > 0 ? macdSignalLine[macdSignalLine.length - 1] : 0;
    const macdHistogram = lastMacd - lastSignal;

    // Last 10 MACD histogram values for chart
    const macdHistArr = [];
    const minLen = Math.min(macdLine.length, macdSignalLine.filter(v=>v!=null).length);
    const sigFiltered = macdSignalLine.filter(v=>v!=null);
    for (let i = 0; i < Math.min(macdLine.length, sigFiltered.length); i++) {
      macdHistArr.push(macdLine[i] - sigFiltered[i]);
    }
    const last10Hist = macdHistArr.slice(-10);

    // Volume SMA20
    const volumeSma20 = sma(volumes, 20);
    const currentVolume = volumes[volumes.length - 1];
    const volumeRatio = volumeSma20 > 0 ? currentVolume / volumeSma20 : 1;

    // 52-week high/low (last 252 days)
    const slice252 = (arr) => arr.slice(-252);
    const high52w = Math.max(...slice252(highs));
    const low52w = Math.min(...slice252(lows));

    // Trend
    let trend = "SIDEWAYS";
    if (sma50 && sma200 && price > sma50 && sma50 > sma200) trend = "UPTREND";
    else if (sma50 && price < sma50) trend = "DOWNTREND";

    // Support / Resistance (last 20 days)
    const recentLows = lows.slice(-20);
    const recentHighs = highs.slice(-20);
    const support = Math.min(...recentLows);
    const resistance = Math.max(...recentHighs);

    // % vs SMAs
    const priceVsSma50 = sma50 ? ((price - sma50) / sma50) * 100 : null;
    const priceVsSma200 = sma200 ? ((price - sma200) / sma200) * 100 : null;

    const data = {
      rsi: rsi ? parseFloat(rsi.toFixed(1)) : null,
      sma50: sma50 ? parseFloat(sma50.toFixed(2)) : null,
      sma200: sma200 ? parseFloat(sma200.toFixed(2)) : null,
      macd: parseFloat(lastMacd.toFixed(4)),
      macdSignal: parseFloat(lastSignal.toFixed(4)),
      macdHistogram: parseFloat(macdHistogram.toFixed(4)),
      macdHistLast10: last10Hist,
      volumeSma20: volumeSma20 ? Math.round(volumeSma20) : null,
      currentVolume: currentVolume || 0,
      volumeRatio: parseFloat(volumeRatio.toFixed(2)),
      high52w: parseFloat(high52w.toFixed(2)),
      low52w: parseFloat(low52w.toFixed(2)),
      trend,
      support: parseFloat(support.toFixed(2)),
      resistance: parseFloat(resistance.toFixed(2)),
      priceVsSma50: priceVsSma50 ? parseFloat(priceVsSma50.toFixed(2)) : null,
      priceVsSma200: priceVsSma200 ? parseFloat(priceVsSma200.toFixed(2)) : null,
    };

    window.__techCache[symbol] = { data, fetchedAt: Date.now() };
    return data;
  } catch (e) {
    return null;
  }
}

// ---- FEATURE 2: Enhanced AI Prompt Builder ----

// ---- FEATURE 3: Tech Badge Strip on Cards ----
function TechStrip({ symbol }) {
  const [techData, setTechData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    fetchTechnicalData(symbol).then(data => {
      if (!cancelled) {
        setTechData(data);
        setLoading(false);
      }
    });
    return () => { cancelled = true; };
  }, [symbol]);

  if (loading) {
    return (
      <div className="tech-strip">
        <span className="tech-chip loading"></span>
      </div>
    );
  }
  if (!techData) return null;

  const rsiClass = techData.rsi < 40 ? 'rsi-low' : techData.rsi > 70 ? 'rsi-high' : 'rsi-neutral';
  const trendClass = techData.trend === 'UPTREND' ? 'trend-up' : techData.trend === 'DOWNTREND' ? 'trend-down' : 'trend-side';
  const trendIcon = techData.trend === 'UPTREND' ? '↑' : techData.trend === 'DOWNTREND' ? '↓' : '→';
  const macdClass = techData.macdHistogram > 0 ? 'macd-bull' : 'macd-bear';
  const macdIcon = techData.macdHistogram > 0 ? '▲' : '▼';

  return (
    <div className="tech-strip">
      <span className={`tech-chip ${rsiClass}`}>RSI {techData.rsi}</span>
      <span className={`tech-chip ${trendClass}`}>{trendIcon} {techData.trend}</span>
      {techData.volumeRatio > 1.5 && (
        <span className="tech-chip vol-high">🔥 {techData.volumeRatio}x Vol</span>
      )}
      <span className={`tech-chip ${macdClass}`}>MACD {macdIcon}</span>
    </div>
  );
}

// ---- FEATURE 4: Market Movers Panel ----
function MarketMovers({ onOpenDetail }) {
  const [gainers, setGainers] = React.useState([]);
  const [losers, setLosers] = React.useState([]);
  const [lastUpdated, setLastUpdated] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const { prices } = React.useContext(LiveDataContext);

  const fetchMovers = React.useCallback(async () => {
    setLoading(true);
    let gotData = false;
    // Try Yahoo screener first
    try {
      const [gRes, lRes] = await Promise.allSettled([
        fetch('https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?formatted=true&scrIds=day_gainers&count=5&region=IN&lang=en-IN', { mode: 'cors' }),
        fetch('https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?formatted=true&scrIds=day_losers&count=5&region=IN&lang=en-IN', { mode: 'cors' })
      ]);
      if (gRes.status === 'fulfilled' && lRes.status === 'fulfilled' && gRes.value.ok && lRes.value.ok) {
        const gData = await gRes.value.json();
        const lData = await lRes.value.json();
        const mapQuote = (q) => ({
          symbol: (q.symbol || '').replace('.NS', ''),
          name: q.shortName || q.longName || q.symbol,
          change: q.regularMarketChangePercent?.raw ?? q.regularMarketChangePercent ?? 0,
          price: q.regularMarketPrice?.raw ?? q.regularMarketPrice ?? 0,
        });
        const g = (gData?.finance?.result?.[0]?.quotes || []).map(mapQuote);
        const l = (lData?.finance?.result?.[0]?.quotes || []).map(mapQuote);
        if (g.length > 0 || l.length > 0) {
          setGainers(g.slice(0, 5));
          setLosers(l.slice(0, 5));
          gotData = true;
        }
      }
    } catch (e) {}

    // Fallback: use live prices from context
    if (!gotData) {
      const priceEntries = Object.entries(prices).map(([sym, d]) => {
        const rec = RECOMMENDATIONS.find(r => r.symbol === sym);
        return { symbol: sym, name: rec ? rec.name : sym, change: d.change, price: d.price };
      }).filter(e => e.price > 0 && e.change != null);

      const sorted = [...priceEntries].sort((a, b) => b.change - a.change);
      setGainers(sorted.slice(0, 5));
      setLosers(sorted.slice(-5).reverse());
    }

    setLastUpdated(new Date());
    setLoading(false);
  }, [prices]);

  React.useEffect(() => {
    fetchMovers();
    const id = setInterval(fetchMovers, 60000);
    return () => clearInterval(id);
  }, [fetchMovers]);

  const minutesAgo = lastUpdated ? Math.floor((Date.now() - lastUpdated) / 60000) : null;

  const handleRowClick = (sym) => {
    const rec = RECOMMENDATIONS.find(r => r.symbol === sym);
    if (rec && onOpenDetail) onOpenDetail(rec);
  };

  return (
    <div className="movers-panel">
      <div className="movers-head">
        <div className="movers-title">
          Market Movers
          <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--t-3)', fontWeight: 400 }}>NSE</span>
          {loading && <span style={{ fontSize: 10, color: 'var(--t-4)', fontFamily: 'var(--font-mono)' }}>loading…</span>}
        </div>
        {minutesAgo != null && (
          <span className="movers-timestamp">Updated {minutesAgo === 0 ? 'just now' : `${minutesAgo}m ago`}</span>
        )}
      </div>
      <div className="movers-cols">
        <div className="movers-col">
          <div className="movers-col-head g">Top Gainers</div>
          {gainers.length === 0 && !loading && <div style={{ fontSize: 11, color: 'var(--t-4)', fontFamily: 'var(--font-mono)' }}>No data</div>}
          {gainers.map((g, i) => (
            <div key={i} className="mover-row" onClick={() => handleRowClick(g.symbol)}>
              <div>
                <div className="mover-sym">{g.symbol}</div>
                <div className="mover-name">{g.name}</div>
              </div>
              <div className="mover-chg up">+{g.change.toFixed(2)}%</div>
            </div>
          ))}
        </div>
        <div className="movers-col">
          <div className="movers-col-head l">Top Losers</div>
          {losers.length === 0 && !loading && <div style={{ fontSize: 11, color: 'var(--t-4)', fontFamily: 'var(--font-mono)' }}>No data</div>}
          {losers.map((l, i) => (
            <div key={i} className="mover-row" onClick={() => handleRowClick(l.symbol)}>
              <div>
                <div className="mover-sym">{l.symbol}</div>
                <div className="mover-name">{l.name}</div>
              </div>
              <div className="mover-chg dn">{l.change.toFixed(2)}%</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// This patches ScreenerScreen to add tech filters
const TECH_FILTERS = [
  { id: 'all', label: 'All' },
  { id: 'rsi_os', label: 'RSI Oversold' },
  { id: 'rsi_ob', label: 'RSI Overbought' },
  { id: 'above50ma', label: 'Above 50MA' },
  { id: 'vol_spike', label: 'Volume Spike' },
  { id: 'near52h', label: 'Near 52W High' },
];

function ScreenerScreenV3({ onOpenDetail }) {
  const [sortBy, setSortBy] = React.useState("confidence");
  const [filter, setFilter] = React.useState("all");
  const [nseData, setNseData] = React.useState(null);
  const [nseLoading, setNseLoading] = React.useState(false);
  const [nseError, setNseError] = React.useState(null);
  const [showNse, setShowNse] = React.useState(false);
  const [techFilter, setTechFilter] = React.useState('all');
  const [techFilterLoading, setTechFilterLoading] = React.useState(false);
  const [nseWithTech, setNseWithTech] = React.useState(null);

  const data = React.useMemo(() => {
    let r = [...RECOMMENDATIONS];
    if (filter !== "all") r = r.filter(x => x.market === filter);
    r.sort((a, b) => {
      if (sortBy === "confidence") return b.confidence - a.confidence;
      if (sortBy === "upside") return Math.abs(b.upside) - Math.abs(a.upside);
      if (sortBy === "change") return b.change - a.change;
      if (sortBy === "rr") return b.rr - a.rr;
      return 0;
    });
    return r;
  }, [sortBy, filter]);

  const loadNseData = async () => {
    setNseLoading(true);
    setNseError(null);
    try {
      const NIFTY50_SYMBOLS = [
        "RELIANCE.NS","TCS.NS","HDFCBANK.NS","BHARTIARTL.NS","ICICIBANK.NS",
        "INFOSYS.NS","SBIN.NS","LICI.NS","HINDUNILVR.NS","ITC.NS",
        "BAJFINANCE.NS","KOTAKBANK.NS","LT.NS","HCLTECH.NS","MARUTI.NS",
        "SUNPHARMA.NS","TITAN.NS","WIPRO.NS","ULTRACEMCO.NS","ONGC.NS",
        "NTPC.NS","POWERGRID.NS","TATAMOTORS.NS","NESTLEIND.NS","TATASTEEL.NS",
        "AXISBANK.NS","INDUSINDBK.NS","BAJAJFINSV.NS","TECHM.NS","DRREDDY.NS",
        "ADANIENT.NS","ADANIPORTS.NS","CIPLA.NS","JSWSTEEL.NS","DIVISLAB.NS",
        "COALINDIA.NS","ASIANPAINT.NS","GRASIM.NS","EICHERMOT.NS","BPCL.NS",
        "APOLLOHOSP.NS","HEROMOTOCO.NS","BRITANNIA.NS","BAJAJ-AUTO.NS","SBILIFE.NS",
        "HDFCLIFE.NS","HINDALCO.NS","M&M.NS","TATACONSUM.NS","UPL.NS"
      ];
      const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${NIFTY50_SYMBOLS.join(",")}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const quotes = json?.quoteResponse?.result || [];
      const mapped = quotes.map(q => ({
        symbol: q.symbol.replace(".NS", ""),
        name: q.longName || q.shortName || q.symbol,
        price: q.regularMarketPrice,
        change: q.regularMarketChangePercent,
        volume: q.regularMarketVolume,
        marketCap: q.marketCap,
        pe: q.trailingPE || q.forwardPE || null,
        high52: q.fiftyTwoWeekHigh,
        low52: q.fiftyTwoWeekLow
      }));
      setNseData(mapped);
      setNseWithTech(null);
      setShowNse(true);
    } catch (err) { setNseError(err.message); }
    setNseLoading(false);
  };

  const applyTechFilter = async (filterId) => {
    setTechFilter(filterId);
    if (filterId === 'all' || !nseData) return;
    setTechFilterLoading(true);

    // Fetch tech data in batches of 5
    const results = {};
    const batchSize = 5;
    for (let i = 0; i < nseData.length; i += batchSize) {
      const batch = nseData.slice(i, i + batchSize);
      await Promise.allSettled(batch.map(async row => {
        results[row.symbol] = await fetchTechnicalData(row.symbol);
      }));
      if (i + batchSize < nseData.length) {
        await new Promise(r => setTimeout(r, 200));
      }
    }

    const filtered = nseData.filter(row => {
      const t = results[row.symbol];
      if (!t) return false;
      if (filterId === 'rsi_os') return t.rsi != null && t.rsi < 35;
      if (filterId === 'rsi_ob') return t.rsi != null && t.rsi > 65;
      if (filterId === 'above50ma') return t.sma50 != null && row.price > t.sma50;
      if (filterId === 'vol_spike') return t.volumeRatio > 1.5;
      if (filterId === 'near52h') return t.high52w > 0 && ((row.price / t.high52w) >= 0.95);
      return true;
    });

    setNseWithTech({ filtered, techMap: results });
    setTechFilterLoading(false);
  };

  const displayedNse = (techFilter !== 'all' && nseWithTech) ? nseWithTech.filtered : nseData;

  const fmtVol = (v) => {
    if (!v) return "—";
    if (v >= 1e7) return (v / 1e7).toFixed(2) + " Cr";
    if (v >= 1e5) return (v / 1e5).toFixed(2) + " L";
    return v.toLocaleString();
  };
  const fmtMktCap = (v) => {
    if (!v) return "—";
    const cr = v / 1e7;
    if (cr >= 1e5) return (cr / 1e5).toFixed(1) + "L Cr";
    if (cr >= 1000) return Math.round(cr / 1000) + "K Cr";
    return Math.round(cr) + " Cr";
  };

  return (
    <div>
      <div className="hero">
        <div>
          <div className="hero-eyebrow">Screener</div>
          <h1>Find your next <em>position</em>.</h1>
        </div>
      </div>

      <div className="filter-bar">
        <button className={`chip ${filter === "all" ? "active" : ""}`} onClick={() => setFilter("all")}>All</button>
        <button className={`chip ${filter === "IN" ? "active" : ""}`} onClick={() => setFilter("IN")}>🇮🇳 NSE</button>
        <button className={`chip ${filter === "CRYPTO" ? "active" : ""}`} onClick={() => setFilter("CRYPTO")}>₿ Crypto</button>
        <div className="chip-divider"></div>
        <span style={{ fontSize: 11, color: "var(--t-3)", marginRight: 4, fontFamily: "var(--font-mono)" }}>SORT</span>
        <button className={`chip ${sortBy === "confidence" ? "active" : ""}`} onClick={() => setSortBy("confidence")}>Confidence</button>
        <button className={`chip ${sortBy === "upside" ? "active" : ""}`} onClick={() => setSortBy("upside")}>Upside</button>
        <button className={`chip ${sortBy === "rr" ? "active" : ""}`} onClick={() => setSortBy("rr")}>R:R</button>
        <button className={`chip ${sortBy === "change" ? "active" : ""}`} onClick={() => setSortBy("change")}>Today's Move</button>
        <button className="chip" onClick={loadNseData} disabled={nseLoading}
          style={{ marginLeft: 8, background: "rgba(52,211,153,0.1)", color: "#34d399", borderColor: "#34d39944" }}>
          {nseLoading ? "⟳ Loading…" : "🔄 Load Live NSE Data"}
        </button>
      </div>

      {nseError && (
        <div style={{ margin: "8px 0 12px", padding: "10px 16px", background: "var(--sell-w)", color: "var(--sell)", borderRadius: 8, fontSize: 12, fontFamily: "var(--font-mono)" }}>
          NSE fetch error: {nseError}
        </div>
      )}

      {showNse && nseData && (
        <div style={{ marginBottom: 32 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--t-1)" }}>Nifty 50 — Live NSE Data</div>
            <span style={{ fontSize: 11, color: "#34d399", fontFamily: "var(--font-mono)" }}>● LIVE</span>
            <button className="iconbtn" style={{ marginLeft: "auto", fontSize: 11 }} onClick={() => { setShowNse(false); setTechFilter('all'); setNseWithTech(null); }}>✕ Hide</button>
          </div>

          {/* Tech Filter Chips */}
          <div className="screener-tech-filters">
            <span style={{ fontSize: 10, color: 'var(--t-3)', fontFamily: 'var(--font-mono)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>TECH FILTER</span>
            {TECH_FILTERS.map(f => (
              <button key={f.id}
                className={`chip ${techFilter === f.id ? (f.id === 'all' ? 'active' : 'tech-active') : ''}`}
                style={{ fontSize: 11, padding: '5px 10px' }}
                onClick={() => applyTechFilter(f.id)}
                disabled={techFilterLoading}>
                {techFilterLoading && techFilter === f.id ? '⟳ ' : ''}{f.label}

            ))}
            {techFilter !== 'all' && nseWithTech && (
              <span style={{ fontSize: 11, color: 'var(--t-3)', fontFamily: 'var(--font-mono)' }}>
                {nseWithTech.filtered.length} stocks match

            )}
          </div>

          <table className="screener-table">
            <thead>
              <tr>
                <th>Symbol</th><th>Name</th><th>Price (₹)</th><th>Change%</th>
                <th>Volume</th><th>Mkt Cap</th><th>P/E</th><th>52W High</th><th>52W Low</th><th>Picks</th>
              </tr>
            </thead>
            <tbody>
              {(displayedNse || []).map(row => {
                const matchRec = RECOMMENDATIONS.find(r => r.symbol === row.symbol);
                return (
                  <tr key={row.symbol} style={{ cursor: matchRec ? "pointer" : "default" }}
                    onClick={() => matchRec && onOpenDetail(matchRec)}>
                    <td style={{ fontWeight: 700 }}>{row.symbol}</td>

          <thead>
            <tr>
              <th>Indicator</th>

              <th>vs Price</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{ fontWeight: 600 }}>SMA 50</td>

              <td className={techData.priceVsSma50 != null ? (techData.priceVsSma50 >= 0 ? 'up' : 'dn') : ''}>

              <span className="key-level-value">₹{techData.resistance.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>

}

function DetailPanelV3({ rec, onClose, onRecUpdate }) {
  if (!rec) return null;
  const [analyzing, setAnalyzing] = React.useState(false);
  const [analyzeError, setAnalyzeError] = React.useState(null);
  const [showCouncil, setShowCouncil] = React.useState(false);
  const { prices } = React.useContext(LiveDataContext);
  const liveData = prices[rec.symbol];
  const displayPrice = liveData ? liveData.price : rec.price;
  const displayChange = liveData ? liveData.change : rec.change;
  const actionCls = rec.action.toLowerCase();
  const upCls = displayChange >= 0 ? "up" : "dn";
  const isShort = rec.direction === "SHORT";
  const apiKey = typeof localStorage !== "undefined" ? localStorage.getItem("bullseye_anthropic_key") : null;
  const keys = getFreeAIKeys();
  const hasFreeAI = keys.gemini || keys.claude;

  const handleAnalyze = async () => {
    if (!apiKey || analyzing) return;
    setAnalyzing(true);
    setAnalyzeError(null);
    try {
      // Use enhanced prompt with tech data
      const techData = window.__techCache[rec.symbol]?.data || null;
      const enhancedPrompt = buildEnhancedStockPrompt(rec, displayPrice, displayChange, techData);
      const result = await callGemini(enhancedPrompt, GEMINI_KEY);
      // Merge result into rec
      const merged = {
        ...rec,

        confidence: (result.confidence || 7) * 10,
        rationale: result.reasoning || rec.rationale,
        analyst: "BULLSEYE AI",
        source: "AI Analysis"

      window.__aiAnalysisCache[rec.id] = { loading: false, data: merged };

            </div>

// ---- Enhanced HomeScreenV3 with MarketMovers ----
function HomeScreenV3({ onOpenDetail, onGoToSettings }) {
  const [filter, setFilter] = React.useState("all");
  const [actionFilter, setActionFilter] = React.useState("ALL");
  const [aiRunning, setAiRunning] = React.useState(false);
  const aiCache = useAIAnalysis();
  const apiKey = typeof localStorage !== "undefined" ? localStorage.getItem("bullseye_anthropic_key") : null;

  const filtered = React.useMemo(() => {
    let r = RECOMMENDATIONS;
    if (filter !== "all") r = r.filter(x => x.market === filter);
    if (actionFilter !== "ALL") r = r.filter(x => x.action === actionFilter);
    return r;
  }, [filter, actionFilter]);

  const stats = React.useMemo(() => {
    const total = RECOMMENDATIONS.length;
    const buys = RECOMMENDATIONS.filter(r => r.action === "BUY").length;
    const sells = RECOMMENDATIONS.filter(r => r.action === "SELL").length;
    const holds = RECOMMENDATIONS.filter(r => r.action === "HOLD").length;
    const avgConf = Math.round(RECOMMENDATIONS.reduce((a, r) => a + r.confidence, 0) / total);
    return { total, buys, sells, holds, avgConf };
  }, []);

  const watchlistRecs = RECOMMENDATIONS.slice(0, 7);

  const handleAnalyzeAll = async () => {
    if (aiRunning) return;
    setAiRunning(true);
    // Use enhanced prompts with tech data
    for (let i = 0; i < filtered.length; i += 5) {
      const batch = filtered.slice(i, i + 5);
      await Promise.allSettled(batch.map(async rec => {
        window.__aiAnalysisCache[rec.id] = { loading: true };
        notifyAIListeners();
        try {
          const techData = await fetchTechnicalData(rec.symbol);
          const { prices } = { prices: {} };
          const price = rec.price;
          const change = rec.change;
          const prompt = buildEnhancedStockPrompt(rec, price, change, techData);
          const result = await callGemini(prompt, GEMINI_KEY);
          window.__aiAnalysisCache[rec.id] = {
            loading: false,
            data: {
              action: result.verdict || rec.action,
              confidence: (result.confidence || 7) * 10,
              rationale: result.reasoning || rec.rationale,
              analyst: "BULLSEYE AI",
              source: "AI Analysis"
            }
          };
        } catch (err) {
          window.__aiAnalysisCache[rec.id] = { loading: false, error: err.message };
        }
        notifyAIListeners();
      }));
      if (i + 5 < filtered.length) await new Promise(r => setTimeout(r, 200));
    }
    setAiRunning(false);
  };

  return (
    <div>
      <div className="hero">

          <div>Active Picks<strong>{stats.total}</strong></div>

        <div className="macro-cell"><div className="ml">SENSEX</div><div className="mv">79,450</div><div className="mc up">+0.62%</div></div>

          <div className="filter-bar">
