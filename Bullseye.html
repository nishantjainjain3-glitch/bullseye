  DetailPanelV3,
  HomeScreenV3,
});

// Also alias pctFromCurrent so it's available globally (it's defined in shared components block)
if (!window.pctFromCurrent) {
  window.pctFromCurrent = function(current, target) {
    return ((target - current) / current) * 100;
  };
}
</script>

<script type="text/babel">
/* global React, ReactDOM */
/* global HomeScreenV2, DetailPanelV2, PortfolioScreenV2, SettingsScreenV2 */
/* global HomeScreenV3, DetailPanelV3, ScreenerScreenV3 */
/* global TweaksPanel, TweakSection, TweakRadio, TweakColor, TweakToggle, TweakSelect, useTweaks */
/* global LiveDataContext, LiveDataProvider */
/* global WatchlistScreen, AlertsScreen, NewsScreen, OnboardingScreen */
/* global fetchCoinGeckoMarkets, GEMINI_KEY, callGemini */

// ============================================================
// CRYPTO SCREENER — full top-50 CoinGecko table with AI
// ============================================================

function fmtLargeNum(n) {
  if (!n) return "—";
  if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9) return "$" + (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
  return "$" + n.toFixed(0);
}

function fmtCryptoPrice(p) {
  if (!p && p !== 0) return "—";
  if (p >= 1000) return "$" + p.toLocaleString("en-US", { maximumFractionDigits: 0 });
  if (p >= 1) return "$" + p.toFixed(2);
  if (p >= 0.01) return "$" + p.toFixed(4);
  return "$" + p.toFixed(6);
}

function CryptoPctCell({ value }) {
  if (value == null) return <td style={{ color: "var(--t-3)" }}>—</td>;
  const isUp = value >= 0;
  return (
    <td style={{ color: isUp ? "var(--buy)" : "var(--sell)", fontWeight: 500 }}>
      {isUp ? "+" : ""}{value.toFixed(2)}%
    </td>
  );
}

function CryptoDetailModal({ coin, onClose }) {
  const [aiResult, setAiResult] = React.useState(null);
  const [aiLoading, setAiLoading] = React.useState(false);
  const [aiError, setAiError] = React.useState(null);

  const runAI = async () => {
    setAiLoading(true);
    setAiError(null);
    const prompt = `You are a professional crypto analyst. Analyze ${coin.name} (${coin.symbol.toUpperCase()}):

Current Price: $${coin.current_price}
24h Change: ${coin.price_change_percentage_24h?.toFixed(2)}%
7d Change: ${coin.price_change_percentage_7d_in_currency?.toFixed(2)}%
Market Cap: ${fmtLargeNum(coin.market_cap)}
24h Volume: ${fmtLargeNum(coin.total_volume)}
24h High: $${coin.high_24h} | 24h Low: $${coin.low_24h}
Circulating Supply: ${coin.circulating_supply ? (coin.circulating_supply / 1e6).toFixed(2) + "M" : "N/A"}
Market Cap Rank: #${coin.market_cap_rank}

Consider: BTC dominance trends, macro risk appetite, ETF flows, on-chain adoption, layer-1 competition.

Respond STRICT JSON only (no markdown):
{
  "verdict": "BUY",
  "confidence": 72,
  "entry_price": ${coin.current_price},
  "target_price": ${(coin.current_price * 1.2).toFixed(2)},
  "stop_loss": ${(coin.current_price * 0.85).toFixed(2)},
  "reasoning": "2-3 sentences with specific on-chain and technical analysis",
  "time_horizon": "Short-term (1-4 weeks)",
  "risk_level": "MEDIUM"
}
verdict must be BUY, SELL, or HOLD. risk_level must be LOW, MEDIUM, HIGH, or VERY HIGH.`;
    try {
      const raw = await callGemini(prompt, GEMINI_KEY);
      setAiResult(raw);
    } catch(e) {
      setAiError(e.message || "AI analysis failed");
    } finally {
      setAiLoading(false);
    }
  };

  const pct24 = coin.price_change_percentage_24h || 0;
  const pct7d = coin.price_change_percentage_7d_in_currency || 0;
  const range = coin.high_24h - coin.low_24h;
  const barPct = range > 0 ? ((coin.current_price - coin.low_24h) / range) * 100 : 50;

  return (
    <div className="detail-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="detail-panel" style={{ maxWidth: 520 }}>
        <div className="dp-header">
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {coin.image && <img src={coin.image} alt={coin.name} style={{ width: 40, height: 40, borderRadius: "50%" }} />}
            <div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "var(--t-1)" }}>{coin.name}</div>
              <div style={{ fontSize: 13, color: "var(--t-3)" }}>{coin.symbol.toUpperCase()} · Rank #{coin.market_cap_rank}</div>
            </div>
          </div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>

        <div style={{ padding: "20px 24px" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 8 }}>
            <span style={{ fontSize: 32, fontWeight: 700, color: "var(--t-1)" }}>{fmtCryptoPrice(coin.current_price)}</span>
            <span style={{ color: pct24 >= 0 ? "var(--buy)" : "var(--sell)", fontWeight: 600, fontSize: 16 }}>
              {pct24 >= 0 ? "+" : ""}{pct24.toFixed(2)}%
            </span>
          </div>

          {/* 24h High/Low bar */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--t-3)", marginBottom: 4 }}>
              <span>24h Low: {fmtCryptoPrice(coin.low_24h)}</span>
              <span>24h High: {fmtCryptoPrice(coin.high_24h)}</span>
            </div>
            <div style={{ height: 6, background: "var(--surface-2)", borderRadius: 3, position: "relative" }}>
              <div style={{ position: "absolute", left: 0, width: `${Math.max(2, barPct)}%`, height: "100%",
                background: "linear-gradient(90deg, var(--sell), var(--buy))", borderRadius: 3 }} />
              <div style={{ position: "absolute", left: `${Math.max(2, barPct)}%`, top: -2, width: 10, height: 10,
                background: "var(--t-1)", borderRadius: "50%", transform: "translateX(-50%)" }} />
            </div>
          </div>

          {/* Stats grid */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
            {[
              ["Market Cap", fmtLargeNum(coin.market_cap)],
              ["24h Volume", fmtLargeNum(coin.total_volume)],
              ["7d Change", `${pct7d >= 0 ? "+" : ""}${pct7d.toFixed(2)}%`],
              ["Circulating", coin.circulating_supply ? (coin.circulating_supply / 1e6).toFixed(2) + "M" : "—"]
            ].map(([label, value]) => (
              <div key={label} style={{ background: "var(--surface-2)", borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontSize: 11, color: "var(--t-3)", marginBottom: 2 }}>{label}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t-1)" }}>{value}</div>
              </div>
            ))}
          </div>

          {/* CoinGecko link */}
          <a href={`https://www.coingecko.com/en/coins/${coin.id}`} target="_blank" rel="noopener"
            style={{ display: "block", textAlign: "center", color: "var(--brand)", fontSize: 13, marginBottom: 16 }}>
            View on CoinGecko ↗
          </a>

          {/* AI Analysis */}
          {!aiResult && !aiLoading && (
            <button onClick={runAI} style={{
              width: "100%", padding: "10px 16px", borderRadius: 8, border: "none",
              background: "var(--brand)", color: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 14
            }}>
              ✦ AI Analysis
            </button>
          )}
          {aiLoading && (
            <div style={{ textAlign: "center", color: "var(--t-3)", padding: "16px" }}>
              Analyzing with AI...
            </div>
          )}
          {aiError && (
            <div style={{ color: "var(--sell)", fontSize: 13, padding: "8px 0" }}>{aiError}</div>
          )}
          {aiResult && (
            <div style={{ background: "var(--surface-2)", borderRadius: 10, padding: "16px", border: "1px solid var(--border)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                <span style={{
                  background: aiResult.verdict === "BUY" ? "var(--buy-w)" : aiResult.verdict === "SELL" ? "var(--sell-w)" : "var(--surface-3)",
                  color: aiResult.verdict === "BUY" ? "var(--buy)" : aiResult.verdict === "SELL" ? "var(--sell)" : "var(--t-2)",
                  padding: "4px 10px", borderRadius: 6, fontWeight: 700, fontSize: 13
                }}>{aiResult.verdict}</span>
                <span style={{ color: "var(--t-3)", fontSize: 12 }}>Confidence: {aiResult.confidence}%</span>
              </div>
              <p style={{ fontSize: 13, color: "var(--t-2)", lineHeight: 1.5, marginBottom: 12 }}>{aiResult.reasoning}</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, fontSize: 12 }}>
                <div><div style={{ color: "var(--t-3)" }}>Entry</div><div style={{ fontWeight: 600 }}>{fmtCryptoPrice(aiResult.entry_price)}</div></div>
                <div><div style={{ color: "var(--t-3)" }}>Target</div><div style={{ fontWeight: 600, color: "var(--buy)" }}>{fmtCryptoPrice(aiResult.target_price)}</div></div>
                <div><div style={{ color: "var(--t-3)" }}>Stop Loss</div><div style={{ fontWeight: 600, color: "var(--sell)" }}>{fmtCryptoPrice(aiResult.stop_loss)}</div></div>
              </div>
              <div style={{ marginTop: 8, fontSize: 11, color: "var(--t-3)" }}>
                Horizon: {aiResult.time_horizon} · Risk: {aiResult.risk_level}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CryptoScreener({ onOpenDetail }) {
  const [coins, setCoins] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [filterMode, setFilterMode] = React.useState("all");
  const [search, setSearch] = React.useState("");
  const [lastRefresh, setLastRefresh] = React.useState(null);
  const [selectedCoin, setSelectedCoin] = React.useState(null);

  const loadCoins = React.useCallback(async () => {
    try {
      const data = await fetchCoinGeckoMarkets();
      setCoins(data);
      setLastRefresh(new Date());
      setError(null);
    } catch(e) {
      setError(e.message || "Failed to fetch crypto data");
    } finally {
      setLoading(false);
    }
  }, []);

  React.useEffect(() => {
    loadCoins();
    const id = setInterval(loadCoins, 60000);
    return () => clearInterval(id);
  }, [loadCoins]);

  const filtered = React.useMemo(() => {
    let result = coins;
    if (search.trim()) {
      const q = search.toLowerCase();
      result = result.filter(c => c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q));
    }
    if (filterMode === "top10") result = result.filter(c => c.market_cap_rank <= 10);
    else if (filterMode === "gainers") result = result.filter(c => (c.price_change_percentage_24h || 0) > 5);
    else if (filterMode === "losers") result = result.filter(c => (c.price_change_percentage_24h || 0) < -5);
    else if (filterMode === "highvol") result = result.filter(c => c.total_volume > 1e9);
    return result;
  }, [coins, filterMode, search]);

  return (
    <div style={{ padding: "0 24px 40px" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "24px 0 16px" }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "var(--t-1)" }}>₿ Crypto Markets</h2>
          <div style={{ fontSize: 13, color: "var(--t-3)", marginTop: 2 }}>
            Top 50 by market cap · {lastRefresh ? <>🟢 LIVE · Updated {lastRefresh.toLocaleTimeString()}</> : "Loading..."}
          </div>
        </div>
        <button onClick={loadCoins} style={{
          padding: "7px 14px", borderRadius: 8, border: "1px solid var(--border)",
          background: "var(--surface)", color: "var(--t-2)", cursor: "pointer", fontSize: 13
        }}>⟳ Refresh</button>
      </div>

      {/* Filters + Search */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16, alignItems: "center" }}>
        {[
          ["all", "All (50)"],
          ["top10", "Top 10"],
          ["gainers", "Gainers 24h>5%"],
          ["losers", "Losers 24h<-5%"],
          ["highvol", "High Volume"]
        ].map(([mode, label]) => (
          <button key={mode} onClick={() => setFilterMode(mode)} style={{
            padding: "6px 12px", borderRadius: 20, border: "1px solid var(--border)",
            background: filterMode === mode ? "var(--brand)" : "var(--surface)",
            color: filterMode === mode ? "#fff" : "var(--t-2)",
            cursor: "pointer", fontSize: 12, fontWeight: 500
          }}>{label}</button>
        ))}
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search coin..."
          style={{
            marginLeft: "auto", padding: "6px 12px", borderRadius: 8,
            border: "1px solid var(--border)", background: "var(--surface)",
            color: "var(--t-1)", fontSize: 13, width: 160, outline: "none"
          }}
        />
      </div>

      {/* Table */}
      {loading && <div style={{ textAlign: "center", padding: 40, color: "var(--t-3)" }}>Loading crypto data...</div>}
      {error && <div style={{ textAlign: "center", padding: 40, color: "var(--sell)" }}>{error}</div>}
      {!loading && !error && (
        <div style={{ overflowX: "auto", borderRadius: 12, border: "1px solid var(--border)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "var(--surface-2)", borderBottom: "1px solid var(--border)" }}>
                {["#", "Name", "Price", "24h %", "7d %", "Market Cap", "Volume 24h", "24h High/Low"].map(h => (
                  <th key={h} style={{
                    padding: "10px 14px", textAlign: h === "Name" ? "left" : "right",
                    color: "var(--t-3)", fontWeight: 600, fontSize: 11, whiteSpace: "nowrap"
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((coin, i) => {
                const pct24 = coin.price_change_percentage_24h;
                const pct7d = coin.price_change_percentage_7d_in_currency;
                return (
                  <tr key={coin.id} onClick={() => setSelectedCoin(coin)} style={{
                    borderBottom: "1px solid var(--border)", cursor: "pointer",
                    background: i % 2 === 0 ? "transparent" : "var(--surface)"
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = "var(--surface-2)"}
                  onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? "transparent" : "var(--surface)"}
                  >
                    <td style={{ padding: "10px 14px", color: "var(--t-3)", textAlign: "right" }}>{coin.market_cap_rank}</td>
                    <td style={{ padding: "10px 14px", minWidth: 160 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        {coin.image && <img src={coin.image} alt={coin.name} style={{ width: 24, height: 24, borderRadius: "50%" }} />}
                        <div>
                          <div style={{ fontWeight: 600, color: "var(--t-1)" }}>{coin.name}</div>
                          <div style={{ fontSize: 11, color: "var(--t-3)" }}>{coin.symbol.toUpperCase()}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "10px 14px", textAlign: "right", fontWeight: 600, color: "var(--t-1)" }}>
                      {fmtCryptoPrice(coin.current_price)}
                    </td>
                    <CryptoPctCell value={pct24} />
                    <CryptoPctCell value={pct7d} />
                    <td style={{ padding: "10px 14px", textAlign: "right", color: "var(--t-2)" }}>{fmtLargeNum(coin.market_cap)}</td>
                    <td style={{ padding: "10px 14px", textAlign: "right", color: "var(--t-2)" }}>{fmtLargeNum(coin.total_volume)}</td>
                    <td style={{ padding: "10px 14px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <span style={{ color: "var(--buy)", fontSize: 11 }}>{fmtCryptoPrice(coin.high_24h)}</span>
                      <span style={{ color: "var(--t-4)", margin: "0 4px" }}>/</span>
                      <span style={{ color: "var(--sell)", fontSize: 11 }}>{fmtCryptoPrice(coin.low_24h)}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {selectedCoin && (
        <CryptoDetailModal coin={selectedCoin} onClose={() => setSelectedCoin(null)} />
      )}
    </div>
  );
}

// Completely replace App to use V2 components directly (avoids the late-binding issue)

function AppInnerV2() {
  const [tab, setTab] = React.useState("home");
  const [detail, setDetail] = React.useState(null);
  const [t, setTweak] = useTweaks({
    "accent": "#d4a04a",
    "theme": "dark",
    "density": "comfortable",
    "headlineFont": "Instrument Serif",
    "showOnboarding": false
  });
  const liveData = React.useContext(LiveDataContext);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--brand", t.accent);
    document.documentElement.style.setProperty("--brand-w", t.accent + "22");
    document.documentElement.style.setProperty("--brand-d", t.accent + "14");
    if (t.theme === "light") {
      document.documentElement.style.setProperty("--bg", "#f7f6f1");
      document.documentElement.style.setProperty("--bg-soft", "#efede7");
      document.documentElement.style.setProperty("--surface", "#ffffff");
      document.documentElement.style.setProperty("--surface-2", "#f1efe8");
      document.documentElement.style.setProperty("--surface-3", "#e6e3da");
      document.documentElement.style.setProperty("--border", "#e6e3da");
      document.documentElement.style.setProperty("--border-2", "#d4d0c4");
      document.documentElement.style.setProperty("--border-3", "#b8b3a3");
      document.documentElement.style.setProperty("--t-1", "#1a1814");
      document.documentElement.style.setProperty("--t-2", "#5a564e");
      document.documentElement.style.setProperty("--t-3", "#8a8578");
      document.documentElement.style.setProperty("--t-4", "#b8b3a3");
    } else {
      ["--bg","--bg-soft","--surface","--surface-2","--surface-3","--border","--border-2","--border-3","--t-1","--t-2","--t-3","--t-4"].forEach(p => document.documentElement.style.removeProperty(p));
    }
    if (t.headlineFont === "Manrope") document.documentElement.style.setProperty("--font-serif", '"Manrope", sans-serif');
    else if (t.headlineFont === "Space Grotesk") document.documentElement.style.setProperty("--font-serif", '"Space Grotesk", sans-serif');
    else document.documentElement.style.setProperty("--font-serif", '"Instrument Serif", serif');
  }, [t.accent, t.theme, t.headlineFont]);

  React.useEffect(() => {
    const fn = (e) => { if (e.key === "Escape") setDetail(null); };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, []);

  const openDetail = (rec) => setDetail(rec);

  return (
    <React.Fragment>
      {t.showOnboarding && (
        <OnboardingScreen onContinue={() => setTweak("showOnboarding", false)} />
      )}

      {!t.showOnboarding && (
        <React.Fragment>
          <nav className="topnav">
            <div className="brand-mark">
              <div className="bull"></div>
              <span>BULL<em>seye</em></span>
            </div>
            <div className="navtabs">
              <button className={`navtab ${tab === "home" ? "active" : ""}`} onClick={() => setTab("home")}>Picks</button>
              <button className={`navtab ${tab === "screener" ? "active" : ""}`} onClick={() => setTab("screener")}>Screener</button>
              <button className={`navtab ${tab === "crypto" ? "active" : ""}`} onClick={() => setTab("crypto")}>₿ Crypto</button>
              <button className={`navtab ${tab === "watchlist" ? "active" : ""}`} onClick={() => setTab("watchlist")}>Watchlist</button>
              <button className={`navtab ${tab === "portfolio" ? "active" : ""}`} onClick={() => setTab("portfolio")}>Portfolio</button>
              <button className={`navtab ${tab === "alerts" ? "active" : ""}`} onClick={() => setTab("alerts")}>
                Alerts<span className="dot-new"></span>
              </button>
              <button className={`navtab ${tab === "news" ? "active" : ""}`} onClick={() => setTab("news")}>News</button>
              <button className={`navtab ${tab === "settings" ? "active" : ""}`} onClick={() => setTab("settings")}>Profile</button>
            </div>
            <div className="navright">
              <div className="search-mini" onClick={() => alert("Search opens here")}>
                <span>🔍</span>
                <span>Search any stock or crypto…</span>
                <span className="kbd">⌘K</span>
              </div>
              <div className="market-pill">
                <span className={liveData.isLive ? "live-dot" : "live-dot offline"}></span>
                {liveData.isLive ? <>🟢 LIVE · NSE OPEN</> : <>⚫ CACHED · NSE OPEN</>}
              </div>
              <div className="avatar">A</div>
            </div>
          </nav>

          <div className="page">
            {tab === "home"      && <HomeScreenV3 onOpenDetail={openDetail} onGoToSettings={() => setTab("settings")} />}
            {tab === "screener"  && <ScreenerScreenV3 onOpenDetail={openDetail} />}
            {tab === "crypto"    && <CryptoScreener onOpenDetail={openDetail} />}
            {tab === "watchlist" && <WatchlistScreen onOpenDetail={openDetail} />}
            {tab === "portfolio" && <PortfolioScreenV2 onOpenDetail={openDetail} />}
            {tab === "alerts"    && <AlertsScreen onOpenDetail={openDetail} />}
            {tab === "news"      && <NewsScreen />}
            {tab === "settings"  && <SettingsScreenV2 />}
          </div>

          {detail && <DetailPanelV3 rec={detail} onClose={() => setDetail(null)} onRecUpdate={(updated) => setDetail(updated)} />}
        </React.Fragment>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Style">
          <TweakColor label="Brand accent" value={t.accent} options={["#d4a04a","#34d399","#6fa0ff","#f87171","#c084fc"]} onChange={v => setTweak("accent", v)} />
          <TweakRadio label="Theme" value={t.theme} options={[{ value: "dark", label: "Dark" }, { value: "light", label: "Light" }]} onChange={v => setTweak("theme", v)} />
          <TweakSelect label="Headline font" value={t.headlineFont} options={["Instrument Serif","Manrope","Space Grotesk"].map(f => ({ value: f, label: f }))} onChange={v => setTweak("headlineFont", v)} />
        </TweakSection>
        <TweakSection title="Demo">
          <TweakToggle label="Show onboarding screen" value={t.showOnboarding} onChange={v => setTweak("showOnboarding", v)} />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

function AppV2() {
  return (
    <LiveDataProvider>
      <AppInnerV2 />
    </LiveDataProvider>
  );
}

// Re-render into root (replaces the old App render)
ReactDOM.createRoot(document.getElementById("root")).render(<AppV2 />);
</script>
</body>
</html>
