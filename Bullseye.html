<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BULLSEYE — Stock picks with targets</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* =========================================================
   BULLSEYE — Stock recommendations platform
   Premium dark fintech aesthetic
   ========================================================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Surfaces */
  --bg:        #07070a;
  --bg-soft:   #0c0c12;
  --surface:   #11111a;
  --surface-2: #171722;
  --surface-3: #1f1f2c;
  --border:    #1d1d2a;
  --border-2:  #2a2a3a;
  --border-3:  #3a3a4e;

  /* Text */
  --t-1: #f4f4f7;
  --t-2: #a4a4b8;
  --t-3: #6c6c84;
  --t-4: #44445a;

  /* Status */
  --buy:    #34d399;
  --buy-w:  #34d39922;
  --buy-d:  #34d39912;
  --sell:   #f87171;
  --sell-w: #f8717122;
  --sell-d: #f8717112;
  --hold:   #fbbf24;
  --hold-w: #fbbf2422;
  --hold-d: #fbbf2412;

  /* Brand */
  --brand:   #d4a04a;   /* saffron / bull */
  --brand-w: #d4a04a22;
  --brand-d: #d4a04a14;

  /* Risk */
  --risk-low:  #34d399;
  --risk-med:  #fbbf24;
  --risk-high: #fb923c;
  --risk-vh:   #f87171;

  /* Fonts */
  --font-sans: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --font-serif: "Instrument Serif", "Times New Roman", serif;

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--t-1);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; color: inherit; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-3); }

/* ============ TYPOGRAPHY ============ */
.font-serif { font-family: var(--font-serif); font-weight: 400; }
.font-mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "zero" 1; }
.mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "zero" 1; }
.italic { font-style: italic; }

/* ============ NAV ============ */
.topnav {
  position: sticky; top: 0; z-index: 200;
  height: 64px;
  background: rgba(7, 7, 10, 0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 28px;
}
.brand-mark {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-serif);
  font-size: 24px;
  letter-spacing: -0.01em;
  color: var(--t-1);
}
.brand-mark .bull {
  width: 28px; height: 28px;
  background: var(--brand);
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.brand-mark .bull::after {
  content: ""; position: absolute;
  inset: 8px;
  background: var(--bg);
  border-radius: 50%;
}
.brand-mark .bull::before {
  content: ""; position: absolute;
  inset: 12px;
  background: var(--brand);
  border-radius: 50%;
  z-index: 2;
}
.brand-mark em {
  font-style: italic;
  color: var(--brand);
}

.navtabs {
  display: flex; gap: 2px;
  flex: 1;
}
.navtab {
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--t-3);
  border-radius: 7px;
  letter-spacing: -0.01em;
  transition: all 0.15s;
  position: relative;
}
.navtab:hover { color: var(--t-1); }
.navtab.active {
  color: var(--t-1);
  background: var(--surface-2);
}
.navtab .dot-new {
  position: absolute; top: 4px; right: 4px;
  width: 5px; height: 5px;
  background: var(--brand);
  border-radius: 50%;
}

.navright {
  display: flex; align-items: center; gap: 12px;
}
.market-pill {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 10px;
  border: 1px solid var(--border-2);
  border-radius: 7px;
  color: var(--t-2);
}
.market-pill .live-dot {
  width: 6px; height: 6px;
  background: var(--buy);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--buy);
  animation: pulse 2s ease-in-out infinite;
}
.market-pill .live-dot.closed {
  background: var(--t-4); box-shadow: none; animation: none;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.search-mini {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  color: var(--t-3);
  font-family: var(--font-mono);
  cursor: pointer;
  min-width: 220px;
  transition: border-color 0.15s;
}
.search-mini:hover { border-color: var(--border-2); }
.search-mini .kbd {
  margin-left: auto;
  padding: 1px 5px;
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-radius: 3px;
  font-size: 10px;
  color: var(--t-3);
}
.avatar {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--brand), #b8842f);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: #1a1208;
}

/* ============ PAGE / LAYOUT ============ */
.page {
  max-width: 1480px;
  margin: 0 auto;
  padding: 24px 28px 80px;
}
.page-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
}
@media (max-width: 1080px) {
  .page-grid { grid-template-columns: 1fr; }
}

/* ============ HERO ============ */
.hero {
  margin-bottom: 28px;
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--brand);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.hero-eyebrow::before {
  content: ""; width: 24px; height: 1px; background: var(--brand);
}
.hero h1 {
  font-family: var(--font-serif);
  font-size: 56px;
  line-height: 1.02;
  letter-spacing: -0.02em;
  font-weight: 400;
  color: var(--t-1);
  max-width: 720px;
}
.hero h1 em {
  font-style: italic; color: var(--brand);
}
.hero-meta {
  display: flex; gap: 28px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--t-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.hero-meta strong {
  display: block;
  font-family: var(--font-sans);
  font-size: 18px;
  font-weight: 600;
  color: var(--t-1);
  text-transform: none;
  letter-spacing: -0.01em;
  margin-top: 4px;
}
.hero-meta strong.up { color: var(--buy); }
.hero-meta strong.dn { color: var(--sell); }
@media (max-width: 720px) {
  .hero h1 { font-size: 38px; }
}

/* ============ MACRO BAR ============ */
.macro-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  overflow: hidden;
}
.macro-cell {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
}
.macro-cell:last-child { border-right: none; }
.macro-cell .ml {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
  letter-spacing: 0.06em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.macro-cell .mv {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 18px;
  color: var(--t-1);
  letter-spacing: -0.01em;
}
.macro-cell .mc {
  font-family: var(--font-mono);
  font-size: 11px;
  margin-top: 3px;
}
.up { color: var(--buy); }
.dn { color: var(--sell); }

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.chip {
  padding: 7px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--t-2);
  font-weight: 500;
  letter-spacing: -0.01em;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--border-2); color: var(--t-1); }
.chip.active {
  background: var(--t-1); color: var(--bg); border-color: var(--t-1);
}
.chip .count {
  font-family: var(--font-mono);
  font-size: 10px;
  opacity: 0.7;
}
.chip-divider {
  width: 1px; height: 18px; background: var(--border-2);
  margin: 0 4px;
}
.filter-bar .right {
  margin-left: auto;
  display: flex; gap: 8px; align-items: center;
}
.iconbtn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--t-2);
  transition: all 0.15s;
}
.iconbtn:hover { border-color: var(--border-2); color: var(--t-1); }
.iconbtn.active { background: var(--t-1); color: var(--bg); border-color: var(--t-1); }

/* ============ RECOMMENDATION CARD ============ */
.recs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 14px;
}
.rec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.rec-card:hover {
  border-color: var(--border-2);
  transform: translateY(-1px);
}
.rec-card.buy::before,
.rec-card.sell::before,
.rec-card.hold::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.2s;
}
.rec-card.buy::before { background: var(--buy); }
.rec-card.sell::before { background: var(--sell); }
.rec-card.hold::before { background: var(--hold); }
.rec-card:hover::before { opacity: 1; }

.rec-head {
  padding: 14px 16px 10px;
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px;
}
.rec-ident { display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 0; }
.rec-logo {
  width: 36px; height: 36px;
  background: var(--surface-3);
  border: 1px solid var(--border-2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
  color: var(--t-1);
}
.rec-logo.crypto { background: linear-gradient(135deg, #f7931a22, #f7931a08); border-color: #f7931a44; color: #f7931a; }
.rec-logo.us { background: linear-gradient(135deg, #4480ff22, #4480ff08); border-color: #4480ff44; color: #6fa0ff; }
.rec-logo.in { background: linear-gradient(135deg, #d4a04a22, #d4a04a08); border-color: #d4a04a44; color: var(--brand); }

.rec-symbol {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--t-1);
  display: flex; align-items: center; gap: 6px;
}
.rec-exchange {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
}
.rec-name {
  font-size: 12px;
  color: var(--t-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.action-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 4px 9px;
  border-radius: 5px;
  font-family: var(--font-mono);
  flex-shrink: 0;
}
.action-badge.buy { background: var(--buy-w); color: var(--buy); }
.action-badge.sell { background: var(--sell-w); color: var(--sell); }
.action-badge.hold { background: var(--hold-w); color: var(--hold); }
.action-badge .short-tag {
  margin-left: 4px;
  font-size: 9px;
  opacity: 0.7;
}

.rec-price-row {
  padding: 0 16px 12px;
  display: flex; align-items: baseline; gap: 12px;
}
.rec-price {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--t-1);
}
.rec-change {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  display: flex; align-items: center; gap: 3px;
}
.rec-spark {
  margin-left: auto;
  width: 90px; height: 30px;
}

/* Targets ladder */
.targets-block {
  padding: 12px 16px;
  background: var(--bg-soft);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.targets-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
}
.targets-label {
  color: var(--t-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-size: 10px;
}
.targets-ladder {
  display: flex; align-items: center; gap: 0;
  height: 28px;
  position: relative;
}
.ladder-track {
  position: relative;
  flex: 1;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
}
.ladder-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--buy), var(--brand));
  border-radius: 2px;
}
.rec-card.sell .ladder-fill {
  background: linear-gradient(90deg, var(--sell), #ff8844);
}
.ladder-mark {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 8px; height: 8px;
  background: var(--bg);
  border: 1.5px solid var(--border-2);
  border-radius: 50%;
}
.ladder-mark.now {
  border-color: var(--t-1);
  background: var(--t-1);
  width: 10px; height: 10px;
}
.ladder-mark.target { border-color: var(--brand); }
.ladder-mark.target.t1 { background: var(--buy); border-color: var(--buy); }
.ladder-mark.sl { border-color: var(--sell); background: var(--sell); }
.ladder-mark-label {
  position: absolute;
  top: 18px;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--t-3);
  white-space: nowrap;
}

.targets-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  padding: 10px 0 4px;
}
.target-cell {
  text-align: center;
  padding: 4px 0;
}
.target-cell .tl {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--t-3);
  letter-spacing: 0.04em;
  margin-bottom: 3px;
}
.target-cell .tv {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
}
.target-cell.sl .tv { color: var(--sell); }
.target-cell.entry .tv { color: var(--t-1); }
.target-cell.t1 .tv { color: var(--buy); }
.target-cell.t2 .tv { color: var(--brand); }
.target-cell.t3 .tv { color: #6fa0ff; }
.target-cell.sl .tl, .target-cell.t1 .tl, .target-cell.t2 .tl, .target-cell.t3 .tl, .target-cell.entry .tl { font-weight: 600; }

/* Footer */
.rec-foot {
  padding: 12px 16px 14px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}
.conf-block {
  display: flex; align-items: center; gap: 10px;
}
.conf-ring {
  width: 38px; height: 38px;
  position: relative;
  flex-shrink: 0;
}
.conf-ring svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.conf-ring .track { fill: none; stroke: var(--surface-3); stroke-width: 4; }
.conf-ring .fill { fill: none; stroke: var(--brand); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
.conf-ring .pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--t-1);
}
.conf-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--t-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.conf-label strong {
  display: block;
  color: var(--t-1);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  margin-top: 2px;
  letter-spacing: 0;
  text-transform: none;
}

.rec-meta-tags {
  display: flex; gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.tagchip {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 3px 7px;
  background: var(--surface-3);
  border-radius: 4px;
  color: var(--t-2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.risk-chip {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 3px 7px;
  border-radius: 4px;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.risk-LOW { background: var(--risk-low)22; color: var(--risk-low); }
.risk-MEDIUM { background: var(--risk-med)22; color: var(--risk-med); }
.risk-HIGH { background: var(--risk-high)22; color: var(--risk-high); }
.risk-VERY-HIGH { background: var(--risk-vh)22; color: var(--risk-vh); }

.rr-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 7px;
  background: var(--brand-w);
  color: var(--brand);
  border-radius: 4px;
  font-weight: 700;
}

/* ============ SIDE RAIL CARDS ============ */
.rail-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.rail-head {
  padding: 13px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.rail-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--t-1);
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.rail-title .count-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  background: var(--surface-3);
  color: var(--t-2);
  border-radius: 10px;
  font-weight: 600;
}
.rail-action {
  font-size: 11px;
  color: var(--t-3);
  font-weight: 500;
  letter-spacing: -0.01em;
}
.rail-action:hover { color: var(--brand); }

.wl-item {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.wl-item:last-child { border-bottom: none; }
.wl-item:hover { background: var(--bg-soft); }
.wl-info { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.wl-mini-logo {
  width: 28px; height: 28px;
  background: var(--surface-3);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  flex-shrink: 0;
}
.wl-sym {
  font-size: 12px;
  font-weight: 600;
  color: var(--t-1);
}
.wl-name {
  font-size: 10px;
  color: var(--t-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wl-price-block {
  text-align: right;
  flex-shrink: 0;
}
.wl-price {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--t-1);
}
.wl-change {
  font-family: var(--font-mono);
  font-size: 10px;
  margin-top: 1px;
}

.news-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: var(--bg-soft); }
.news-headline {
  font-size: 12px;
  line-height: 1.5;
  color: var(--t-1);
  margin-bottom: 6px;
  font-weight: 500;
}
.news-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
}
.news-impact {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
}
.news-impact.HIGH { background: var(--sell-w); color: var(--sell); }
.news-impact.MEDIUM { background: var(--hold-w); color: var(--hold); }
.news-impact.LOW { background: var(--surface-3); color: var(--t-3); }
.news-source { color: var(--brand); }
.news-dot { color: var(--border-3); }

.alert-item {
  padding: 12px 16px;
  display: flex; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.alert-item:last-child { border-bottom: none; }
.alert-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.alert-icon.TARGET_HIT { background: var(--buy-w); color: var(--buy); }
.alert-icon.STOP_LOSS { background: var(--sell-w); color: var(--sell); }
.alert-icon.BREAKOUT { background: var(--brand-w); color: var(--brand); }
.alert-icon.NEW_PICK { background: var(--surface-3); color: var(--t-1); }
.alert-icon.PRICE_ALERT { background: #4480ff22; color: #6fa0ff; }
.alert-icon.NEWS { background: var(--hold-w); color: var(--hold); }
.alert-body { flex: 1; min-width: 0; }
.alert-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--t-1);
  margin-bottom: 3px;
  display: flex; align-items: center; gap: 7px;
}
.alert-sym {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  background: var(--surface-3);
  border-radius: 3px;
  color: var(--t-2);
}
.alert-msg {
  font-size: 11px;
  color: var(--t-3);
  line-height: 1.45;
}
.alert-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-4);
  margin-top: 4px;
}

/* ============ DETAIL SCREEN ============ */
.detail-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 300;
  display: flex; justify-content: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.detail-overlay.open {
  opacity: 1; pointer-events: auto;
}
.detail-panel {
  width: 100%;
  max-width: 880px;
  background: var(--bg);
  border-left: 1px solid var(--border-2);
  overflow-y: auto;
  transform: translateX(40px);
  transition: transform 0.25s;
}
.detail-overlay.open .detail-panel {
  transform: translateX(0);
}
.detail-head {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px;
}
.detail-close {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--t-2);
}
.detail-title-block { display: flex; gap: 16px; align-items: flex-start; }
.detail-logo {
  width: 56px; height: 56px;
  background: var(--surface-3);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 16px; font-weight: 700;
}
.detail-name-block h2 {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.detail-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--t-3);
  letter-spacing: 0.04em;
}
.detail-price-row {
  padding: 20px 28px;
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.detail-price {
  font-family: var(--font-mono);
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.detail-change {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  margin-left: 12px;
}
.detail-action-large {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.05em;
  border-radius: 8px;
  font-family: var(--font-mono);
}
.detail-action-large.buy { background: var(--buy-w); color: var(--buy); }
.detail-action-large.sell { background: var(--sell-w); color: var(--sell); }
.detail-action-large.hold { background: var(--hold-w); color: var(--hold); }

.detail-chart {
  height: 200px;
  margin: 20px 28px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.detail-section {
  padding: 20px 28px;
  border-top: 1px solid var(--border);
}
.detail-section h3 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--t-3);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.detail-section h3::after {
  content: ""; flex: 1; height: 1px; background: var(--border);
}
.detail-targets {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.detail-target {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 12px;
  text-align: center;
}
.detail-target .lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}
.detail-target .val {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}
.detail-target .upside {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
}
.detail-target.sl .val { color: var(--sell); }
.detail-target.entry .val { color: var(--t-1); }
.detail-target.t1 .val { color: var(--buy); }
.detail-target.t2 .val { color: var(--brand); }
.detail-target.t3 .val { color: #6fa0ff; }

.rationale-box {
  background: var(--surface);
  border-left: 2px solid var(--brand);
  border-radius: var(--radius);
  padding: 18px 20px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--t-1);
}
.rationale-box.buy { border-color: var(--buy); }
.rationale-box.sell { border-color: var(--sell); }
.rationale-box.hold { border-color: var(--hold); }
.analyst-line {
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--t-3);
  display: flex; align-items: center; gap: 8px;
}

.catalyst-list {
  display: grid;
  gap: 8px;
}
.catalyst-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
}
.catalyst-num {
  width: 24px; height: 24px;
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--brand);
  flex-shrink: 0;
}
.catalyst-text { font-size: 13px; color: var(--t-1); }

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
}
.metric-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.metric-lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
  letter-spacing: 0.06em;
  margin-bottom: 5px;
  text-transform: uppercase;
}
.metric-val {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--t-1);
}

.detail-actions {
  display: flex; gap: 8px;
  padding: 20px 28px 32px;
  border-top: 1px solid var(--border);
  position: sticky; bottom: 0;
  background: var(--bg);
}
.btn-primary {
  padding: 12px 20px;
  background: var(--buy);
  color: #052016;
  border-radius: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.03em;
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: filter 0.15s;
}
.btn-primary:hover { filter: brightness(1.05); }
.btn-primary.sell { background: var(--sell); color: #2a0a10; }
.btn-secondary {
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  color: var(--t-1);
}
.btn-secondary:hover { border-color: var(--t-3); }

/* ============ SCREENER TABLE ============ */
.screener-table {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  border-collapse: separate;
  border-spacing: 0;
}
.screener-table thead th {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 12px 14px;
  text-align: left;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.screener-table tbody td {
  padding: 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.screener-table tbody tr:hover td { background: var(--bg-soft); }
.screener-table tbody tr:last-child td { border-bottom: none; }
.screener-table .sym-cell {
  display: flex; align-items: center; gap: 10px;
}
.screener-table .num { font-family: var(--font-mono); font-weight: 600; }
.screener-table .actions {
  display: flex; gap: 4px; justify-content: flex-end;
}

/* ============ PORTFOLIO ============ */
.portfolio-summary {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.ps-cell {
  padding: 20px 24px;
  background: var(--surface);
}
.ps-cell .lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--t-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.ps-cell .val {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.ps-cell .val.large {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 42px;
}
.ps-cell .sub {
  font-family: var(--font-mono);
  font-size: 11px;
  margin-top: 4px;
}

/* ============ ONBOARDING / LOGIN MINI ============ */
.onb-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  max-width: 440px;
  margin: 60px auto;
}
.onb-card h2 {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.onb-card h2 em { color: var(--brand); font-style: italic; }
.onb-sub {
  color: var(--t-2);
  font-size: 14px;
  margin-bottom: 24px;
}

/* ============ MISC ============ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--t-3);
  font-size: 13px;
  font-family: var(--font-mono);
}

.sec-title {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.sec-title em { color: var(--brand); font-style: italic; }
.sec-sub {
  font-size: 13px;
  color: var(--t-3);
  margin-bottom: 24px;
}

/* sparkline svg */
.spark-svg { width: 100%; height: 100%; }
.spark-path { fill: none; stroke-width: 1.5; }
.spark-buy { stroke: var(--buy); }
.spark-sell { stroke: var(--sell); }
.spark-area-buy { fill: url(#gradBuy); }
.spark-area-sell { fill: url(#gradSell); }

/* responsive */
@media (max-width: 720px) {
  .page { padding: 16px; }
  .topnav { padding: 0 16px; gap: 16px; }
  .navtabs { display: none; }
  .search-mini { display: none; }
  .recs-grid { grid-template-columns: 1fr; }
  .portfolio-summary { grid-template-columns: 1fr 1fr; }
}

/* ====== LIVE DATA & AI FEATURE STYLES ====== */
/* Live price indicator dot on card */
.live-price-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #34d399;
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
  animation: livePulse 2s infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* Offline live dot in navbar */
.live-dot.offline {
  background: #6b7280;
  animation: none;
}

/* AI badge on rec cards */
.ai-badge {
  display: inline-flex;
  align-items: center;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--brand);
  background: var(--brand-w);
  border: 1px solid var(--brand);
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: 6px;
  vertical-align: middle;
  font-family: var(--font-mono);
}

/* AI loading card state */
.rec-card.ai-loading {
  opacity: 0.65;
  animation: aiPulse 1.5s ease-in-out infinite;
}
@keyframes aiPulse {
  0%, 100% { opacity: 0.65; }
  50% { opacity: 0.85; }
}

/* AI analyze button */
.ai-analyze-btn {
  border: 1px solid !important;
  font-weight: 600 !important;
}
.ai-analyze-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* ====== FREE AI COUNCIL STYLES ====== */
.ai-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  padding: 3px 8px; border-radius: 20px; color: #fff;
  font-family: var(--font-mono);
}
.ai-pill.gemini { background: linear-gradient(135deg, #4285f4, #34a853); }
.ai-pill.groq   { background: linear-gradient(135deg, #f55036, #ff8c00); }
.ai-pill.mistral{ background: linear-gradient(135deg, #7c3aed, #a855f7); }
.ai-pill.claude { background: linear-gradient(135deg, #cc785c, #d4956a); }

.council-modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 600;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.council-modal {
  background: rgba(20,20,30,0.98);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  width: 100%; max-width: 860px;
  max-height: 90vh; overflow-y: auto;
  padding: 28px;
}
.council-modal-title {
  font-family: var(--font-serif);
  font-size: 26px; color: var(--t-1);
  margin-bottom: 6px;
}
.council-modal-sub {
  font-size: 12px; color: var(--t-3);
  font-family: var(--font-mono);
  margin-bottom: 24px;
}
.council-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.council-col {
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  padding: 16px;
}
.council-col.loading {
  animation: aiPulse 1.5s ease-in-out infinite;
}
.council-verdict {
  font-size: 20px; font-weight: 800;
  letter-spacing: 0.04em; margin: 12px 0 4px;
  font-family: var(--font-mono);
}
.council-verdict.BUY  { color: #00e676; }
.council-verdict.SELL { color: #ff5252; }
.council-verdict.HOLD { color: #fbbf24; }
.council-verdict.unavailable { color: var(--t-4); font-size: 13px; }
.council-conf-bar {
  height: 4px; background: var(--surface-3);
  border-radius: 2px; margin: 8px 0;
}
.council-conf-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--brand), #6fa0ff);
}
.council-detail-row {
  display: flex; justify-content: space-between;
  font-size: 10px; font-family: var(--font-mono);
  color: var(--t-3); margin: 2px 0;
}
.council-detail-val { color: var(--t-1); font-weight: 600; }
.council-reason {
  font-size: 11px; color: var(--t-2);
  line-height: 1.5; margin-top: 8px;
  padding-top: 8px; border-top: 1px solid var(--border);
}
.council-consensus {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.council-consensus.strong {
  border-color: rgba(212,160,74,0.5);
  background: rgba(212,160,74,0.06);
  box-shadow: 0 0 20px rgba(212,160,74,0.15);
}
.consensus-label {
  font-size: 11px; color: var(--t-3);
  font-family: var(--font-mono); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 8px;
}
.consensus-verdict {
  font-size: 32px; font-weight: 800;
  letter-spacing: 0.05em; font-family: var(--font-mono);
}
.consensus-verdict.BUY  { color: #00e676; }
.consensus-verdict.SELL { color: #ff5252; }
.consensus-verdict.HOLD { color: #fbbf24; }
.consensus-count {
  font-size: 13px; color: var(--t-2);
  margin-top: 6px; font-family: var(--font-mono);
}
.consensus-fire {
  font-size: 18px; margin-bottom: 4px;
}

/* Council vote button on cards */
.council-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
  color: #a855f7; background: rgba(168,85,247,0.12);
  border: 1px solid rgba(168,85,247,0.4);
  border-radius: 4px; padding: 2px 6px;
  margin-left: 6px; cursor: pointer;
  font-family: var(--font-mono);
  transition: all 0.15s;
}
.council-btn:hover { background: rgba(168,85,247,0.2); }

/* Today's Picks feature */
.top-picks-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(99,102,241,0.15));
  border: 1px solid rgba(168,85,247,0.4);
  border-radius: 8px;
  color: #c084fc;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.2s;
}
.top-picks-btn:hover { background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(99,102,241,0.25)); }
.top-picks-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.top-picks-panel {
  background: var(--surface);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.top-picks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.top-pick-card {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 10px;
  padding: 16px;
  position: relative;
}
.top-pick-card.multi-ai {
  border-color: rgba(168,85,247,0.4);
}
.multi-ai-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(99,102,241,0.2));
  color: #c084fc; border: 1px solid rgba(168,85,247,0.4);
  border-radius: 4px; padding: 2px 6px;
  font-family: var(--font-mono);
}
.pick-source-pill {
  display: inline-flex; align-items: center;
  font-size: 9px; font-weight: 600;
  background: var(--surface-3); color: var(--t-2);
  border-radius: 4px; padding: 2px 6px;
  font-family: var(--font-mono);
}

/* Averaging assistant */
.position-section {
  border-top: 1px solid var(--border);
  padding: 20px 28px;

  width: 100%;

.position-input:focus { border-color: var(--brand); }
.avg-advice-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, rgba(212,160,74,0.2), rgba(168,85,247,0.15));
  border: 1px solid rgba(212,160,74,0.4);
  border-radius: 8px;
  color: var(--brand);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.2s;
}
.avg-advice-btn:hover { background: linear-gradient(135deg, rgba(212,160,74,0.3), rgba(168,85,247,0.2)); }
.avg-advice-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.avg-result {
  margin-top: 16px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 10px;
  padding: 16px;
}
.avg-action-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 18px; font-weight: 800;
  letter-spacing: 0.04em;
  font-family: var(--font-mono);
  margin-bottom: 12px;
}
.avg-action-badge.AVERAGE_DOWN { color: #00e676; }
.avg-action-badge.PYRAMID_UP   { color: #6fa0ff; }
.avg-action-badge.HOLD         { color: #fbbf24; }
.avg-action-badge.EXIT         { color: #ff5252; }
.avg-detail-row {
  font-size: 12px; color: var(--t-2);
  font-family: var(--font-mono);
  margin: 4px 0;
}
.avg-detail-row strong { color: var(--t-1); }
.avg-pnl-row {
  display: flex; gap: 16px;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.avg-pnl-cell {
  flex: 1; text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.avg-pnl-label { font-size: 10px; color: var(--t-3); font-family: var(--font-mono); letter-spacing: 0.06em; margin-bottom: 3px; }
.avg-pnl-val { font-size: 16px; font-weight: 700; font-family: var(--font-mono); }
.avg-pnl-val.profit { color: #00e676; }
.avg-pnl-val.loss   { color: #ff5252; }
.avg-agree-bar {
  margin-top: 12px;
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--t-3);
  font-family: var(--font-mono);
}
.avg-agree-track {
  flex: 1; height: 4px; background: var(--surface-3); border-radius: 2px;
}
.avg-agree-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--buy), var(--brand));
}

/* Holdings section */
.holdings-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-top: 28px;
}
.holdings-head {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.holdings-title {
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.add-holding-form {
  display: grid; grid-template-columns: 1fr 1fr 1fr auto auto; gap: 8px;
  padding: 14px 20px;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--border);
  align-items: end;
}
.holding-row {
  padding: 12px 20px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
}
.holding-row:last-child { border-bottom: none; }
.holding-symbol { font-weight: 700; font-size: 13px; min-width: 70px; }
.holding-name { font-size: 11px; color: var(--t-3); }
.holding-meta { flex: 1; display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.holding-cell { text-align: right; }
.holding-cell .hl { font-size: 10px; color: var(--t-3); font-family: var(--font-mono); letter-spacing: 0.04em; }
.holding-cell .hv { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
.ai-advice-btn-small {
  padding: 6px 12px;
  background: rgba(168,85,247,0.12);
  border: 1px solid rgba(168,85,247,0.35);
  border-radius: 7px;
  color: #c084fc;
  font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font-sans);
  white-space: nowrap;
  transition: all 0.15s;
}
.ai-advice-btn-small:hover { background: rgba(168,85,247,0.22); }

/* Free AI keys section in settings */
.free-ai-section {
  background: var(--surface);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
  overflow: hidden;
}
.free-ai-header {
  padding: 16px 22px;
  background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(99,102,241,0.04));
  border-bottom: 1px solid rgba(168,85,247,0.2);
  display: flex; align-items: center; justify-content: space-between;
}
.free-ai-status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  font-family: var(--font-mono);
}
.free-ai-status-pill.some { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
.free-ai-status-pill.none { background: var(--surface-3); color: var(--t-3); border: 1px solid var(--border-2); }
.free-ai-row {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.free-ai-row:last-child { border-bottom: none; }
.free-ai-row-header {
  display: flex; align-items: center; justify-content: space-between;
}
.free-ai-row-inputs {
  display: flex; gap: 8px;
}

/* Skeleton loader */
.skeleton-block {
  background: var(--surface-2);
  border-radius: 6px;
  animation: aiPulse 1.5s ease-in-out infinite;
}

/* ====== TECHNICAL ANALYSIS STYLES ====== */
/* Tech badge strip on rec cards */
.tech-strip {
  padding: 6px 16px 8px;
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
  border-top: 1px solid var(--border);
}
.tech-chip {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.tech-chip.rsi-low { background: rgba(52,211,153,0.15); color: #34d399; }
.tech-chip.rsi-high { background: rgba(248,113,113,0.15); color: #f87171; }
.tech-chip.rsi-neutral { background: var(--surface-3); color: var(--t-2); }
.tech-chip.trend-up { background: rgba(52,211,153,0.1); color: #34d399; }
.tech-chip.trend-down { background: rgba(248,113,113,0.1); color: #f87171; }
.tech-chip.trend-side { background: var(--surface-3); color: var(--t-3); }
.tech-chip.vol-high { background: rgba(212,160,74,0.15); color: var(--brand); }
.tech-chip.macd-bull { background: rgba(52,211,153,0.1); color: #34d399; }
.tech-chip.macd-bear { background: rgba(248,113,113,0.1); color: #f87171; }
.tech-chip.loading { background: var(--surface-3); color: var(--t-4); animation: aiPulse 1.5s ease-in-out infinite; width: 80px; height: 18px; }

/* Market Movers panel */
.movers-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.movers-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.movers-title {
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.movers-cols {
  display: grid; grid-template-columns: 1fr 1fr;
}
.movers-col { padding: 10px 14px; }
.movers-col:first-child { border-right: 1px solid var(--border); }
.movers-col-head {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px; font-weight: 700;
}
.movers-col-head.g { color: var(--buy); }
.movers-col-head.l { color: var(--sell); }
.mover-row {

  padding: 5px 0;
  border-bottom: 1px solid var(--border);

  transition: background 0.1s;

.mover-name { font-size: 9px; color: var(--t-3); font-family: var(--font-mono); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mover-chg { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
.movers-timestamp { font-size: 10px; color: var(--t-4); font-family: var(--font-mono); }

.screener-tech-filters {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px; align-items: center;
}
.screener-tech-filters .chip.tech-active {
  background: rgba(52,211,153,0.15); color: #34d399; border-color: rgba(52,211,153,0.4);
}

.rsi-gauge-wrap {
  margin: 12px 0;
}
.rsi-gauge-bar {
  position: relative; height: 12px; border-radius: 6px;
  background: linear-gradient(90deg, #f87171 0%, #f87171 30%, var(--surface-3) 30%, var(--surface-3) 70%, #f87171 70%, #f87171 100%);
  overflow: visible;
}
.rsi-gauge-marker {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 14px; height: 14px;
  background: var(--t-1); border: 2px solid var(--bg); border-radius: 50%;
  box-shadow: 0 0 6px rgba(0,0,0,0.5);
  transition: left 0.4s ease;
}
.rsi-gauge-labels {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 9px; color: var(--t-3);
  margin-top: 4px;
}
.rsi-gauge-label {
  font-size: 12px; font-weight: 600; margin-top: 8px;
  font-family: var(--font-mono);
}

/* MACD mini bars chart */
.macd-bars {
  display: flex; align-items: flex-end; gap: 3px; height: 40px;
  padding: 4px 0;
}
.macd-bar {
  flex: 1; border-radius: 2px 2px 0 0; min-width: 6px;
  transition: height 0.3s ease;
}
.macd-bar.pos { background: rgba(52,211,153,0.7); }
.macd-bar.neg { background: rgba(248,113,113,0.7); border-radius: 0 0 2px 2px; }

/* Key levels vertical indicator */
.key-levels-bar {
  position: relative; width: 24px; height: 100px;
  background: var(--surface-3); border-radius: 4px;
  flex-shrink: 0;
}
.key-levels-bar .level-dot {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 10px; height: 10px; border-radius: 50%;
}
.key-levels-bar .level-dot.support { background: var(--buy); }
.key-levels-bar .level-dot.price { background: var(--t-1); border: 2px solid var(--bg); }
.key-levels-bar .level-dot.resistance { background: var(--sell); }
.key-levels-container { display: flex; gap: 16px; align-items: flex-start; }
.key-levels-values { flex: 1; display: flex; flex-direction: column; justify-content: space-between; height: 100px; }
.key-level-item { display: flex; flex-direction: column; }
.key-level-label { font-size: 9px; color: var(--t-3); font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; }
.key-level-value { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
.key-level-item.s .key-level-value { color: var(--buy); }
.key-level-item.r .key-level-value { color: var(--sell); }
.key-level-item.p .key-level-value { color: var(--t-1); }

/* MA Table */
.ma-table { width: 100%; border-collapse: collapse; }
.ma-table th { font-family: var(--font-mono); font-size: 10px; color: var(--t-3); letter-spacing: 0.06em; text-transform: uppercase; text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
.ma-table td { font-family: var(--font-mono); font-size: 12px; padding: 8px 10px; border-bottom: 1px solid var(--border); }
.ma-table tr:last-child td { border-bottom: none; }
.ma-table .up { color: var(--buy); }
.ma-table .dn { color: var(--sell); }

/* Load tech data button */
.load-tech-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--surface-2); border: 1px solid var(--border-2);

}
.load-tech-btn:hover { border-color: var(--brand); color: var(--brand); }
.load-tech-btn:disabled { opacity: 0.6; cursor: not-allowed; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">
/* global React */
// Shared components for BULLSEYE

const { useState, useEffect, useMemo, useRef } = React;

// ----- Helpers -----
function fmtPrice(value, currency = "₹") {
  if (value === null || value === undefined) return "—";
  if (Math.abs(value) >= 1000) return `${currency}${value.toLocaleString("en-IN", { maximumFractionDigits: 2 })}`;
  if (Math.abs(value) >= 1) return `${currency}${value.toFixed(2)}`;
  return `${currency}${value.toFixed(4)}`;
}
function fmtChange(value) {
  const sign = value > 0 ? "+" : "";
  return `${sign}${value.toFixed(2)}%`;
}
function pctFromCurrent(current, target) {
  return ((target - current) / current) * 100;
}
function marketLabel(market) {
  return { IN: "NSE", US: "US", CRYPTO: "Crypto" }[market] || market;
}

// ----- Sparkline -----
function Sparkline({ data, action, width = 90, height = 30 }) {
  if (!data || !data.length) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const areaPath = `${path} L${width},${height} L0,${height} Z`;
  const isDown = action === "SELL" || data[data.length - 1] < data[0];
  const gradId = `g-${Math.random().toString(36).slice(2, 8)}`;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="spark-svg" preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={isDown ? "#f87171" : "#34d399"} stopOpacity="0.25" />
          <stop offset="100%" stopColor={isDown ? "#f87171" : "#34d399"} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${gradId})`} />
      <path d={path} className={`spark-path ${isDown ? "spark-sell" : "spark-buy"}`} />
    </svg>
  );
}

// ----- Confidence ring -----
function ConfRing({ value, size = 38, strokeColor }) {
  const r = (size - 4) / 2 - 2;
  const c = 2 * Math.PI * r;
  const offset = c - (value / 100) * c;
  return (
    <div className="conf-ring" style={{ width: size, height: size }}>
      <svg viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size / 2} cy={size / 2} r={r} className="track" />
        <circle
          cx={size / 2} cy={size / 2} r={r}
          className="fill"
          style={{ stroke: strokeColor || "var(--brand)" }}
          strokeDasharray={c}
          strokeDashoffset={offset}
        />
      </svg>
      <div className="pct">{value}</div>
    </div>
  );
}

// ----- Big chart (for detail) -----
function BigChart({ data, action }) {
  const ref = useRef(null);
  const [size, setSize] = useState({ w: 800, h: 200 });
  useEffect(() => {
    if (!ref.current) return;
    const o = new ResizeObserver(entries => {
      for (const e of entries) {
        setSize({ w: e.contentRect.width, h: e.contentRect.height });
      }
    });
    o.observe(ref.current);
    return () => o.disconnect();
  }, []);

  if (!data?.length) return <div ref={ref} style={{ width: "100%", height: "100%" }} />;

  // Extend the sparkline with smoother interpolated data
  const extended = [];
  for (let i = 0; i < data.length - 1; i++) {
    extended.push(data[i]);
    for (let j = 1; j <= 4; j++) {
      const t = j / 5;
      extended.push(data[i] * (1 - t) + data[i + 1] * t + (Math.random() - 0.5) * (Math.abs(data[i + 1] - data[i]) * 0.15));
    }
  }
  extended.push(data[data.length - 1]);

  const min = Math.min(...extended);
  const max = Math.max(...extended);
  const range = max - min || 1;
  const pad = 20;
  const w = size.w;
  const h = size.h;
  const pts = extended.map((v, i) => {
    const x = pad + (i / (extended.length - 1)) * (w - 2 * pad);
    const y = pad + (h - 2 * pad) - ((v - min) / range) * (h - 2 * pad);
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const areaPath = `${path} L${w - pad},${h - pad} L${pad},${h - pad} Z`;
  const isDown = action === "SELL";
  const stroke = isDown ? "#f87171" : "#34d399";

  return (
    <div ref={ref} style={{ width: "100%", height: "100%", position: "relative" }}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: "100%" }} preserveAspectRatio="none">
        <defs>
          <linearGradient id="bigGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={stroke} stopOpacity="0.25" />
            <stop offset="100%" stopColor={stroke} stopOpacity="0" />
          </linearGradient>
        </defs>
        {/* horizontal grid lines */}
        {[0.25, 0.5, 0.75].map((t, i) => (
          <line key={i} x1={pad} y1={pad + t * (h - 2 * pad)} x2={w - pad} y2={pad + t * (h - 2 * pad)}
            stroke="#1d1d2a" strokeWidth="0.5" strokeDasharray="2,4" />
        ))}
        <path d={areaPath} fill="url(#bigGrad)" />
        <path d={path} fill="none" stroke={stroke} strokeWidth="1.75" strokeLinejoin="round" />
        <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="3" fill={stroke} />
        <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="6" fill={stroke} opacity="0.25" />
      </svg>
    </div>
  );
}

// ----- Target ladder -----
function TargetLadder({ rec }) {
  // For BUY: SL ... entry ... T1 ... T2 ... T3
  // For SELL (short): T3 ... T2 ... T1 ... entry ... SL (inverted)
  const isShort = rec.direction === "SHORT" || rec.action === "SELL";
  const entry = (rec.entry.low + rec.entry.high) / 2;
  const { stopLoss, targets, price } = rec;

  // For visualization: build range from SL to furthest target
  const allLevels = [stopLoss, entry, ...targets, price];
  const min = Math.min(...allLevels);
  const max = Math.max(...allLevels);
  const range = max - min || 1;
  const xPos = (v) => ((v - min) / range) * 100;

  // For SELL (short), the "progress" goes from entry DOWN to targets (so visual fill is from right to left)
  // We'll keep markers in true position but show context

  return (
    <div className="ladder-track" style={{ position: "relative", margin: "12px 6px 24px" }}>
      {/* Filled track between SL and current price */}
      {!isShort && (
        <div className="ladder-fill" style={{ left: `${xPos(rec.stopLoss)}%`, width: `${xPos(rec.price) - xPos(rec.stopLoss)}%` }} />
      )}
      {isShort && (
        <div className="ladder-fill" style={{ left: `${xPos(rec.price)}%`, width: `${xPos(rec.stopLoss) - xPos(rec.price)}%` }} />
      )}
      {/* Stop loss */}
      <div className="ladder-mark sl" style={{ left: `${xPos(stopLoss)}%` }} title={`SL ${stopLoss}`} />
      <div className="ladder-mark-label" style={{ left: `${xPos(stopLoss)}%` }}>SL</div>
      {/* Entry */}
      <div className="ladder-mark" style={{ left: `${xPos(entry)}%` }} title={`Entry ${entry}`} />
      <div className="ladder-mark-label" style={{ left: `${xPos(entry)}%` }}>Entry</div>
      {/* Targets */}
      {targets.map((t, i) => (
        <React.Fragment key={i}>
          <div className={`ladder-mark target ${i === 0 ? "t1" : ""}`} style={{ left: `${xPos(t)}%` }} title={`T${i + 1} ${t}`} />
          <div className="ladder-mark-label" style={{ left: `${xPos(t)}%` }}>T{i + 1}</div>
        </React.Fragment>
      ))}
      {/* Now */}
      <div className="ladder-mark now" style={{ left: `${xPos(price)}%` }} title={`Now ${price}`} />
    </div>
  );
}

// ----- Recommendation card -----
function RecCard({ rec, onClick, compact = false, aiLoading = false, hasAI = false }) {
  const { prices } = React.useContext(LiveDataContext);
  const liveData = prices[rec.symbol];
  const displayPrice = liveData ? liveData.price : rec.price;
  const displayChange = liveData ? liveData.change : rec.change;
  const actionCls = rec.action.toLowerCase();
  const upClass = displayChange >= 0 ? "up" : "dn";
  const isShort = rec.direction === "SHORT";

  return (
    <div className={`rec-card ${actionCls}${aiLoading ? " ai-loading" : ""}`} onClick={onClick}>
      <div className="rec-head">
        <div className="rec-ident">
          <div className={`rec-logo ${rec.market.toLowerCase()}`}>{rec.symbol.slice(0, 3)}</div>
          <div style={{ minWidth: 0 }}>
            <div className="rec-symbol">
              {rec.symbol}
              <span className="rec-exchange">{rec.exchange}</span>
              {hasAI && <span className="ai-badge">✦ AI</span>}
            </div>
            <div className="rec-name">{rec.name}</div>
          </div>
        </div>
        <div className={`action-badge ${actionCls}`}>
          {rec.action}
          {isShort && <span className="short-tag">SHORT</span>}
        </div>
      </div>

      <div className="rec-price-row">
        <div className="rec-price">{fmtPrice(displayPrice, rec.currency)}{liveData && <span className="live-price-dot"></span>}</div>
        <div className={`rec-change ${upClass}`}>{fmtChange(displayChange)}</div>
        <div className="rec-spark">
          <Sparkline data={rec.sparkline} action={rec.action} />
        </div>
      </div>

      <div className="targets-block">
        <div className="targets-grid">
          <div className="target-cell sl">
            <div className="tl">SL</div>
            <div className="tv">{fmtPrice(rec.stopLoss, rec.currency)}</div>
          </div>
          <div className="target-cell entry">
            <div className="tl">ENTRY</div>
            <div className="tv mono">{rec.currency}{rec.entry.low}–{rec.entry.high}</div>
          </div>
          {rec.targets.slice(0, 3).map((t, i) => (
            <div className={`target-cell t${i + 1}`} key={i}>
              <div className="tl">T{i + 1}</div>
              <div className="tv">{fmtPrice(t, rec.currency)}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="rec-foot">
        <div className="conf-block">
          <ConfRing value={rec.confidence} />
          <div className="conf-label">
            Confidence
            <strong>{rec.horizon}</strong>
          </div>
        </div>
        <div className="rec-meta-tags">
          <span className={`risk-chip risk-${rec.risk.replace(" ", "-")}`}>{rec.risk}</span>
          <span className="rr-chip">{rec.rr}:1 R/R</span>
        </div>
      </div>
    </div>
  );
}

// ----- Watchlist item -----
function WatchlistItem({ rec, onClick }) {
  const ch = rec.change >= 0 ? "up" : "dn";
  return (
    <div className="wl-item" onClick={onClick}>
      <div className="wl-info">
        <div className={`wl-mini-logo ${rec.market.toLowerCase()}`} style={{
          background: rec.market === "CRYPTO" ? "#f7931a22" : rec.market === "US" ? "#4480ff22" : "#d4a04a22",
          color: rec.market === "CRYPTO" ? "#f7931a" : rec.market === "US" ? "#6fa0ff" : "var(--brand)"
        }}>{rec.symbol.slice(0, 2)}</div>
        <div style={{ minWidth: 0 }}>
          <div className="wl-sym">{rec.symbol}</div>
          <div className="wl-name">{rec.name}</div>
        </div>
      </div>
      <div className="wl-price-block">
        <div className="wl-price">{fmtPrice(rec.price, rec.currency)}</div>
        <div className={`wl-change ${ch}`}>{fmtChange(rec.change)}</div>
      </div>
    </div>
  );
}

// expose
Object.assign(window, {
  fmtPrice, fmtChange, pctFromCurrent, marketLabel,
  Sparkline, ConfRing, BigChart, TargetLadder, RecCard, WatchlistItem
});

</script>

<script type="text/babel">
/* global React */
// ====================================================================
// LIVE DATA CONTEXT — polls Yahoo Finance + CoinGecko every 60s
// ====================================================================

const LiveDataContext = React.createContext({ prices: {}, lastUpdated: null, isLive: false, error: null });

// Crypto CoinGecko id → symbol key mapping (symbol keys use -USD format)
const CRYPTO_ID_MAP = {
  "bitcoin": "BTC-USD",
  "ethereum": "ETH-USD",
  "solana": "SOL-USD",
